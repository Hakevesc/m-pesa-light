<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Payment - Enter PIN</title>
<style>
  @import url("styles/component-keypad.css");
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Border: #E8E8EC;
    --Background: #F5F5F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }

  .phone-frame {
    width: 360px; height: 780px;
    background: var(--Background); border-radius: 30px;
    overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .app-content {
    height: 100%; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px; background: var(--Background);
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  .header-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 12px; background: var(--Background);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.05); }
  .back-btn svg { width: 22px; height: 22px; stroke: var(--On-Surface); stroke-width: 1.8px; fill: none; }
  .header-title {
    color: var(--On-Surface); font-family: 'Switzer', sans-serif;
    font-size: 17px; font-weight: 500; letter-spacing: 0.3px; flex: 1; text-align: center;
  }

  .main-content {
    padding: 8px 20px 20px;
    display: flex; flex-direction: column; flex: 1; gap: 18px;
  }

  /* Summary Card */
  .summary-card {
    background: #FFF; border-radius: 16px; padding: 18px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .summary-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    padding-bottom: 14px; border-bottom: 1px solid #F0F0F0;
  }
  .summary-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-family: 'Switzer', sans-serif; font-size: 14px; font-weight: 700;
  }
  .summary-biller-name { font-family: 'Switzer', sans-serif; font-size: 15px; font-weight: 600; color: var(--On-Surface); }
  .summary-biller-sub { font-family: 'Switzer', sans-serif; font-size: 12px; color: var(--On-Surface-Low); margin-top: 2px; }

  .summary-amount {
    text-align: center; padding: 4px 0 12px;
    border-bottom: 1px solid #F0F0F0; margin-bottom: 12px;
  }
  .summary-amount .label { font-family: 'Switzer', sans-serif; font-size: 12px; color: var(--On-Surface-Low); margin-bottom: 4px; }
  .summary-amount .value { font-family: 'Switzer', sans-serif; font-size: 28px; font-weight: 700; color: var(--Primary); }
  .summary-amount .currency { font-family: 'Switzer', sans-serif; font-size: 14px; color: var(--On-Surface-Low); margin-left: 4px; }

  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .summary-row .lbl { font-family: 'Switzer', sans-serif; font-size: 13px; color: var(--On-Surface-Low); }
  .summary-row .val { font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 600; color: var(--On-Surface); }

  /* PIN Section */
  .pin-section {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .pin-label {
    color: var(--On-Surface); font-family: 'Switzer', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: 0.3px; text-align: center;
  }
  .pin-container { display: flex; gap: 20px; justify-content: center; }
  .pin-box {
    width: 62px; height: 62px; border-radius: 16px;
    background: #FFF; border: 2px solid #ECECEC;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .pin-box.filled { border-color: transparent; }
  .pin-box.filled .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--On-Surface); }
  .pin-box.active { border-color: var(--Primary); background: #FFF5F5; }
  .pin-box.active::after { content:''; width:2px; height:24px; background:var(--Primary); animation: blink 1s step-end infinite; }
  @keyframes blink { from,to{background:transparent} 50%{background:var(--Primary)} }
  .pin-box.error { border-color: var(--Primary); background: #FFF5F5; animation: shake 0.4s ease-in-out; }
  .pin-box.error .dot { width:16px; height:16px; border-radius:50%; background:var(--Primary); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-input { position:absolute; opacity:0; pointer-events:none; }

  /* Pay Button */
  .pay-btn {
    height: 52px; border-radius: 14px; border: none;
    background: #E0E0E0; color: var(--On-Surface-Low);
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 500;
    cursor: not-allowed; transition: all 0.2s;
  }
  .pay-btn.active {
    background: var(--Primary); color: #FFF; cursor: pointer;
    box-shadow: 0 4px 16px rgba(254,53,61,0.25);
  }
  .pay-btn.active:hover { background: #E5303A; transform: translateY(-1px); }
  .pay-btn.active:active { transform: scale(0.98); }

  /* Success Overlay */
  .success-overlay {
    position: absolute; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5); display: none;
    align-items: center; justify-content: center; z-index: 100;
  }
  .success-overlay.show { display: flex; }
  .success-modal {
    width: 280px; background: #FFF; border-radius: 20px; padding: 32px 24px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  .success-icon {
    width: 72px; height: 72px; border-radius: 50%; background: #FFF1F2;
    display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
  }
  .success-icon svg { width: 36px; height: 36px; stroke: var(--Primary); stroke-width: 2.5px; }
  .success-title { font-family: 'Switzer', sans-serif; font-size: 18px; font-weight: 700; color: var(--On-Surface); margin-bottom: 8px; }
  .success-subtitle { font-family: 'Switzer', sans-serif; font-size: 13px; color: var(--On-Surface-Low); line-height: 1.5; margin-bottom: 20px; }
  .success-done-btn {
    width: 100%; height: 44px; border-radius: 12px;
    background: var(--Primary); color: #FFF; border: none;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .success-done-btn:hover { background: #E5303A; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#1C1C21"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#1C1C21"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#1C1C21"/></svg>
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/></svg>
        <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/></svg>
      </div>
    </div>

    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="header-title">Confirm Payment</span>
      <div style="width:36px;"></div>
    </div>

    <div class="main-content">

      <!-- Summary Card -->
      <div class="summary-card">
        <div class="summary-header">
          <div class="summary-icon" id="summaryIcon" style="background:#FFF3E0;color:#F57C00;">EP</div>
          <div>
            <div class="summary-biller-name" id="summaryName">EEPCO</div>
            <div class="summary-biller-sub" id="summarySub">Meter No. 4523061</div>
          </div>
        </div>
        <div class="summary-amount">
          <div class="label">Amount to Pay</div>
          <div>
            <span class="value" id="summaryAmount">580.00</span>
            <span class="currency">ETB</span>
          </div>
        </div>
        <div class="summary-row">
          <span class="lbl">Customer</span>
          <span class="val" id="summaryCustomer">Abebe Girma</span>
        </div>
        <div class="summary-row">
          <span class="lbl">Period</span>
          <span class="val" id="summaryPeriod">June 2026</span>
        </div>
        <div class="summary-row">
          <span class="lbl">Service Fee</span>
          <span class="val" style="color:#1FC83B;">Free</span>
        </div>
      </div>

      <!-- PIN Section -->
      <div class="pin-section">
        <span class="pin-label">Enter Your M-PESA PIN</span>
        <div class="pin-container" id="pinContainer">
          <div class="pin-box" data-index="0"><div class="dot"></div></div>
          <div class="pin-box" data-index="1"><div class="dot"></div></div>
          <div class="pin-box" data-index="2"><div class="dot"></div></div>
          <div class="pin-box" data-index="3"><div class="dot"></div></div>
        </div>
        <input type="password" class="pin-input" id="pinInput" maxlength="4" inputmode="numeric">
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key delete" onclick="pressBackspace()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>

      <button class="pay-btn" id="payBtn" onclick="confirmPayment()" disabled>Pay Bill</button>

    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-modal">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h3 class="success-title">Payment Successful!</h3>
        <p class="success-subtitle" id="successMsg">Your bill has been paid successfully.</p>
        <button class="success-done-btn" onclick="goToConfirmation()">View Receipt</button>
      </div>
    </div>

  </div>
</div>

<script>
  let pin = '';

  // Load session data
  const payData = JSON.parse(sessionStorage.getItem('billPaymentData') || '{}');
  const biller = payData.biller || { abbr:'EP', bg:'#FFF3E0', color:'#F57C00', name:'EEPCO' };

  document.getElementById('summaryIcon').textContent = biller.abbr || 'EP';
  document.getElementById('summaryIcon').style.background = biller.bg || '#FFF3E0';
  document.getElementById('summaryIcon').style.color = biller.color || '#F57C00';
  document.getElementById('summaryName').textContent = biller.name || 'EEPCO';
  if (payData.account) document.getElementById('summarySub').textContent = `Meter No. ${payData.account}`;
  if (payData.payAmount) document.getElementById('summaryAmount').textContent = parseFloat(payData.payAmount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if (payData.customerName) document.getElementById('summaryCustomer').textContent = payData.customerName;
  if (payData.period) document.getElementById('summaryPeriod').textContent = payData.period;

  const successMsg = `${biller.name || 'EEPCO'} bill of ${payData.payAmount || '580.00'} ETB paid.`;
  document.getElementById('successMsg').textContent = successMsg;

  const pinBoxes = document.querySelectorAll('.pin-box');
  const payBtn = document.getElementById('payBtn');

  function updatePinDisplay() {
    pinBoxes.forEach((box, i) => {
      box.classList.remove('filled', 'active', 'error');
      if (i < pin.length) box.classList.add('filled');
      else if (i === pin.length) box.classList.add('active');
    });
    payBtn.classList.toggle('active', pin.length === 4);
    payBtn.disabled = pin.length !== 4;
  }

  function pressKey(val) {
    if (pin.length < 4) { pin += val; updatePinDisplay(); }
  }

  function pressBackspace() {
    pin = pin.slice(0, -1); updatePinDisplay();
  }

  function confirmPayment() {
    if (pin.length === 4) {
      document.getElementById('successOverlay').classList.add('show');
    }
  }

  function goToConfirmation() {
    window.location.href = 'Bill Payment Confirmation.html';
  }

  function goBack() { window.location.href = 'Bill Payment_Enter Amount.html'; }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    else if (e.key === 'Backspace') pressBackspace();
    else if (e.key === 'Enter' && pin.length === 4) confirmPayment();
  });

  updatePinDisplay();
</script>

<script src="figma-export.js"></script>
</body>
</html>
