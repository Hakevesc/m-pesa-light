<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    padding: 20px;
    color: var(--figma-color-text, #333);
    background: var(--figma-color-bg, #fff);
  }
  h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 12px; color: var(--figma-color-text-secondary, #888); margin-bottom: 20px; }
  .drop-zone {
    border: 2px dashed var(--figma-color-border, #ddd);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #a259ff;
    background: rgba(162, 89, 255, 0.04);
  }
  .drop-zone .icon { font-size: 40px; margin-bottom: 8px; }
  .drop-zone p { font-size: 13px; color: var(--figma-color-text-secondary, #888); }
  .drop-zone strong { color: #a259ff; }
  input[type="file"] { display: none; }
  .status {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: none;
    margin-bottom: 16px;
  }
  .status.info { display: block; background: #f0f0ff; color: #5b5fc7; }
  .status.success { display: block; background: #e6f4ea; color: #1e7e34; }
  .status.error { display: block; background: #fde8e8; color: #c0392b; }
  .preview {
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: none;
    font-size: 12px;
  }
  .preview.visible { display: block; }
  .preview .label { color: var(--figma-color-text-secondary, #888); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .preview .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .preview .meta { color: var(--figma-color-text-secondary, #888); }
  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #a259ff; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #8b3ee0; }
  .btn-secondary { background: transparent; color: var(--figma-color-text-secondary, #888); margin-top: 8px; font-size: 12px; }
  .steps { margin-bottom: 20px; }
  .steps .step {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; font-size: 12px; color: var(--figma-color-text-secondary, #888);
  }
  .steps .step .num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--figma-color-bg-secondary, #f0f0f0);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
    color: var(--figma-color-text-secondary, #888);
  }
  .steps .step.active .num { background: #a259ff; color: #fff; }

  .mode-group { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-opt { flex: 1; cursor: pointer; position: relative; }
  .mode-opt input { position: absolute; opacity: 0; pointer-events: none; }
  .mode-card {
    border: 1px solid var(--figma-color-border, #ddd);
    border-radius: 10px; padding: 10px 12px; height: 100%;
    transition: border-color .15s, background .15s;
  }
  .mode-opt input:checked + .mode-card { border-color: #a259ff; background: rgba(162, 89, 255, .06); }
  .mode-title { font-weight: 600; font-size: 12px; margin-bottom: 3px; }
  .mode-desc { font-size: 10.5px; color: var(--figma-color-text-secondary, #888); line-height: 1.4; }
  .opts { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; }
  .opt { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--figma-color-text, #333); cursor: pointer; }
  .opt input { cursor: pointer; }
  .registry {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    font-size: 11px; color: var(--figma-color-text-secondary, #888);
    background: var(--figma-color-bg-secondary, #f5f5f5);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 16px;
  }
  .registry button {
    border: 1px solid var(--figma-color-border, #ddd); background: transparent; color: inherit;
    border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer;
  }
  .registry button:hover { border-color: #c0392b; color: #c0392b; }
</style>
</head>
<body>

<h2>M-PESA → Figma Import</h2>
<p class="sub">Import screens exported from your HTML prototypes</p>

<div class="steps">
  <div class="step">
    <span class="num">1</span>
    <span>Click <strong>Export to Figma</strong> on any HTML page</span>
  </div>
  <div class="step active">
    <span class="num">2</span>
    <span>Drop the <code>.figma-export.json</code> file here</span>
  </div>
  <div class="step">
    <span class="num">3</span>
    <span>Click Import — layers are created on the current page</span>
  </div>
</div>

<div class="mode-group">
  <label class="mode-opt">
    <input type="radio" name="mode" value="design" checked>
    <div class="mode-card">
      <div class="mode-title">Import design</div>
      <div class="mode-desc">Place instances of library components; build the rest as frames.</div>
    </div>
  </label>
  <label class="mode-opt">
    <input type="radio" name="mode" value="library">
    <div class="mode-card">
      <div class="mode-title">Build library</div>
      <div class="mode-desc">Turn tagged elements into master components &amp; variant sets.</div>
    </div>
  </label>
</div>

<div class="opts">
  <label class="opt"><input type="checkbox" id="optAuto" checked> Auto-create components for unmatched elements</label>
  <label class="opt"><input type="checkbox" id="optVars"> Bind colors to Figma variables</label>
</div>

<div class="registry">
  <span id="registryLine">Checking component registry…</span>
  <button id="clearRegistry" type="button">Clear</button>
</div>

<div class="drop-zone" id="dropZone">
  <div class="icon">📂</div>
  <p><strong>Drop .json file here</strong> or click to browse</p>
</div>
<input type="file" id="fileInput" accept=".json">

<div class="preview" id="preview">
  <div class="label">Ready to import</div>
  <div class="name" id="previewName"></div>
  <div class="meta" id="previewMeta"></div>
</div>

<div class="status" id="status"></div>

<button class="btn btn-primary" id="importBtn" disabled>Import to Figma</button>
<button class="btn btn-secondary" id="cancelBtn">Cancel</button>

<script>
  let pendingData = null;
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const importBtn = document.getElementById('importBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const status = document.getElementById('status');
  const preview = document.getElementById('preview');
  const optAuto = document.getElementById('optAuto');
  const optVars = document.getElementById('optVars');
  const registryLine = document.getElementById('registryLine');

  function currentMode() {
    const checked = document.querySelector('input[name="mode"]:checked');
    return checked ? checked.value : 'design';
  }
  function importLabel() {
    return currentMode() === 'library' ? 'Build library' : 'Import to Figma';
  }
  function refreshButtonLabel() {
    if (!importBtn.disabled || pendingData) importBtn.textContent = importLabel();
  }
  Array.prototype.forEach.call(document.querySelectorAll('input[name="mode"]'), (r) => {
    r.addEventListener('change', refreshButtonLabel);
  });

  // Ask the plugin for the current registry count once the UI is ready.
  parent.postMessage({ pluginMessage: { type: 'getRegistry' } }, '*');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file.name.endsWith('.json')) {
      showStatus('Please select a .figma-export.json file', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        pendingData = JSON.parse(e.target.result);
        if (!pendingData.version) throw new Error('Not a valid export file');

        const name = pendingData.name || 'Unknown';
        let meta = '';
        if (pendingData.type === 'multi-screen' && pendingData.screens) {
          meta = pendingData.screens.length + ' screens';
        } else {
          meta = (pendingData.width || 375) + ' × ' + (pendingData.height || 812) + 'px';
        }

        document.getElementById('previewName').textContent = name;
        document.getElementById('previewMeta').textContent = meta;
        preview.classList.add('visible');
        importBtn.disabled = false;
        importBtn.textContent = importLabel();
        showStatus('File loaded — ready to import', 'info');
      } catch (err) {
        showStatus('Invalid file: ' + err.message, 'error');
        pendingData = null;
        importBtn.disabled = true;
      }
    };
    reader.readAsText(file);
  }

  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status ' + type;
  }

  importBtn.addEventListener('click', () => {
    if (!pendingData) return;
    const mode = currentMode();
    importBtn.disabled = true;
    importBtn.textContent = mode === 'library' ? 'Building…' : 'Importing…';
    showStatus(mode === 'library' ? 'Building component library…' : 'Creating Figma layers…', 'info');
    parent.postMessage({
      pluginMessage: {
        type: 'import',
        mode: mode,
        options: { autoRegister: optAuto.checked, bindVariables: optVars.checked },
        data: pendingData
      }
    }, '*');
  });

  document.getElementById('clearRegistry').addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'clearRegistry' } }, '*');
  });

  cancelBtn.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  });

  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'registry') {
      registryLine.textContent = msg.masters
        ? (msg.masters + ' component' + (msg.masters === 1 ? '' : 's') + ' registered')
        : 'No components registered yet';
    }
    if (msg.type === 'done') {
      let done = 'Import complete! Check your canvas.';
      if (msg.mode === 'library' && msg.summary) {
        done = 'Library built — ' + msg.summary.count + ' components ('
             + msg.summary.sets + ' on the Components page).';
      }
      showStatus(done, 'success');
      importBtn.textContent = importLabel();
      importBtn.disabled = false;
    }
    if (msg.type === 'error') {
      showStatus('Error: ' + msg.message, 'error');
      importBtn.textContent = importLabel();
      importBtn.disabled = false;
    }
  };
</script>
</body>
</html>
