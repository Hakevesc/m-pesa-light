<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enable Fingerprint Sign-In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Success: #1FC83B;
    --Success-Light: #E8F9EC;
    --Border: #E8E8EC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== MODAL OVERLAY ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.25s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ===== SUCCESS MODAL ===== */
  .success-modal {
    width: 100%;
    max-width: 320px;
    background: #FFF;
    border-radius: 24px;
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from {
      opacity: 0;
      transform: scale(0.85) translateY(10px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  /* Close Button */
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .close-btn:hover { background: #F0F0F0; }
  .close-btn:active { transform: scale(0.9); }
  .close-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--On-Surface);
    stroke-width: 2px;
  }

  /* Success Icon - Green check */
  .success-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--Success-Light);
    border: 2px solid var(--Success);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  .success-icon svg {
    width: 32px !important;
    height: 32px !important;
    stroke: var(--Success);
    stroke-width: 2.5px;
  }

  /* Title */
  .modal-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: 0.3px;
    line-height: 1.3;
  }

  /* Subtitle */
  .modal-subtitle {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 28px;
    letter-spacing: 0.2px;
    padding: 0 8px;
  }

  /* Button Group */
  .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .btn-primary {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    border: none;
    background: var(--On-Surface);
    color: #FFF;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(28, 28, 33, 0.2);
  }
  .btn-primary:hover {
    background: #2C2C31;
    box-shadow: 0 6px 16px rgba(28, 28, 33, 0.3);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: scale(0.98) translateY(0); }

  .btn-secondary {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    border: none;
    background: #F0F0F2;
    color: var(--On-Surface-Low);
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .btn-secondary:hover {
    background: #E5E5E8;
    color: var(--On-Surface);
  }
  .btn-secondary:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="success-modal">

    <!-- Close Button -->
    <button class="close-btn" onclick="closeModal()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Green Check Icon -->
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <!-- Title -->
    <h2 class="modal-title">You're All Set, Hana!</h2>

    <!-- Subtitle -->
    <p class="modal-subtitle">
      Your M-PESA account has been successfully activated. Welcome to convenient payments.
    </p>

    <!-- Buttons -->
    <div class="modal-actions">
      <button class="btn-primary" onclick="enableFingerprint()">
        Enable Fingerprint Sign-In
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;">
          <path d="M12 2a10 10 0 0 0-7.07 2.93"/>
          <path d="M17.07 4.93A10 10 0 0 1 22 12"/>
          <path d="M12 7a5 5 0 0 0-3.54 1.46"/>
          <path d="M15.54 8.46A5 5 0 0 1 17 12"/>
          <path d="M12 12a2 2 0 0 0-1.41.59"/>
          <path d="M13.41 13.41A2 2 0 0 1 14 15"/>
          <path d="M5 12a7 7 0 0 1 7-7"/>
          <path d="M19 12a7 7 0 0 0-7-7"/>
          <path d="M5 12c0 1.93.78 3.68 2.05 4.95"/>
          <path d="M16.95 16.95A7 7 0 0 1 12 19"/>
          <path d="M12 19v-4"/>
        </svg>
      </button>
      <button class="btn-secondary" onclick="remindLater()">
        Remind me later
      </button>
    </div>

  </div>
</div>

<script>
  function closeModal() { console.log('Modal closed'); }
  function enableFingerprint() {
    closeModal();
    console.log('Navigating to fingerprint setup...');
  }
  function remindLater() {
    closeModal();
    console.log('Fingerprint setup postponed');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
</script>

</body>
</html>
