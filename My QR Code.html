<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My QR Code</title>
<link rel="stylesheet" href="styles/design-tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/component-status-bar.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  body { font-family: 'Inter', sans-serif; }

  .app-content {
    height: 100%;
    padding: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: #F5F5F5;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  /* Red gradient hero behind the card */
  .qr-hero {
    background: linear-gradient(160deg, #A41016 0%, #C41520 30%, #D32F2F 60%, #B71C1C 100%);
    padding: 0 0 80px;
    border-radius: 0 0 30px 30px;
    position: relative;
    overflow: hidden;
  }
  .qr-hero::before {
    content: ''; position: absolute; inset: 0; opacity: 0.20; z-index: 0;
    background-image: url('assets/M-PESA-pattern.svg');
    background-size: 490px; background-position: right -270px top -270px;
    background-repeat: no-repeat; mix-blend-mode: overlay;
  }
  .status-bar { background: transparent; position: relative; z-index: 1; }
  .status-bar .time { color: #fff; }
  .status-icons svg path,
  .status-icons svg rect { fill: #fff; }
  .status-icons svg[viewBox="0 0 28 14"] rect[stroke] { stroke: #fff; fill: none; }

  .header-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 16px 8px;
    position: relative; z-index: 1;
  }
  .back-btn, .header-icon-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover, .header-icon-btn:hover { background: rgba(255,255,255,0.28); }
  .back-btn svg, .header-icon-btn svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2px; fill: none; }
  .header-title { color: #fff; font-family: 'Switzer', sans-serif; font-size: 17px; font-weight: 600; }

  /* Profile inside hero */
  .qr-profile {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 8px 16px 0;
    position: relative; z-index: 1;
  }
  .qr-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.5);
    overflow: hidden; background: #fff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .qr-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .qr-name { color: #fff; font-family: 'Switzer', sans-serif; font-size: 18px; font-weight: 600; }
  .qr-number { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; letter-spacing: 0.4px; }

  /* QR Card overlapping hero */
  .qr-card {
    margin: -64px 20px 0;
    background: #fff;
    border-radius: 24px;
    padding: 22px 22px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 2;
  }

  /* Segmented toggle */
  .qr-seg {
    display: flex; width: 100%;
    background: #F2F2F4; border-radius: 12px; padding: 4px; margin-bottom: 18px;
  }
  .qr-seg button {
    flex: 1; border: none; background: transparent;
    padding: 9px 0; border-radius: 9px;
    font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--On-Surface-Low); cursor: pointer; transition: all 0.2s;
  }
  .qr-seg button.active { background: #fff; color: var(--Primary); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }

  .qr-code-wrap {
    width: 208px; height: 208px;
    padding: 14px;
    border-radius: 18px;
    background: #fff;
    border: 1.5px solid #EFEFF2;
    position: relative;
  }
  #qrCanvas { width: 100%; height: 100%; display: block; }
  .qr-logo-chip {
    position: absolute; top: 50%; left: 50%;
    width: 46px; height: 46px; transform: translate(-50%, -50%);
    background: #fff; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .qr-logo-chip .m {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--Primary); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Switzer', sans-serif; font-weight: 700; font-size: 19px;
  }

  .qr-hint {
    margin-top: 16px; color: var(--On-Surface-Low);
    font-size: 12px; font-weight: 400; text-align: center; line-height: 1.5;
    font-family: 'Switzer', sans-serif;
  }

  /* Amount pill (shown on Receive tab) */
  .qr-amount {
    margin-top: 12px; display: none;
    align-items: center; gap: 8px;
    background: #FFF1F2; border: 1px dashed var(--Primary);
    border-radius: 12px; padding: 8px 14px;
  }
  .qr-amount.show { display: flex; }
  .qr-amount span { color: var(--Primary); font-family: 'Switzer', sans-serif; font-weight: 600; font-size: 15px; }
  .qr-amount input {
    border: none; background: transparent; outline: none;
    width: 110px; font-family: 'Switzer', sans-serif; font-weight: 700; font-size: 16px; color: var(--On-Surface);
  }

  /* Action buttons */
  .qr-actions {
    display: flex; gap: 12px;
    padding: 20px 20px 28px;
    margin-top: auto;
  }
  .qr-btn {
    flex: 1; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .qr-btn svg { width: 18px; height: 18px; stroke-width: 2; fill: none; }
  .qr-btn.primary { background: var(--Primary); color: #fff; box-shadow: 0 4px 12px rgba(254,53,61,0.25); }
  .qr-btn.primary:hover { background: #E5303A; transform: translateY(-1px); }
  .qr-btn.primary svg { stroke: #fff; }
  .qr-btn.secondary { background: #fff; color: var(--On-Surface); border: 1.5px solid var(--Border, #E8E8EC); }
  .qr-btn.secondary:hover { background: #FAFAFA; }
  .qr-btn.secondary svg { stroke: var(--On-Surface); }

  /* Toast */
  .toast {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1C1C21; color: #fff; padding: 12px 20px; border-radius: 12px;
    font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3); opacity: 0; pointer-events: none;
    transition: all 0.3s ease; z-index: 50; display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; stroke: var(--Success); stroke-width: 2.5; fill: none; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <div class="qr-hero">
      <!-- Status Bar -->
      <div class="status-bar">
        <span class="time">10:00</span>
        <div class="status-icons">
          <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#FFF"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#FFF"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#FFF"/></svg>
          <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#FFF"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#FFF"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#FFF"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#FFF" opacity="0.3"/></svg>
          <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#FFF" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#FFF"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#FFF"/></svg>
        </div>
      </div>

      <!-- Header -->
      <div class="header-nav">
        <button class="back-btn" onclick="goBack()" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="header-title">My QR Code</span>
        <button class="header-icon-btn" onclick="showToast('QR refreshed')" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>

      <!-- Profile -->
      <div class="qr-profile">
        <div class="qr-avatar"><img src="assets/avatars/avatar-2.png" alt="Aster" onerror="this.style.display='none'"></div>
        <div class="qr-name">Aster Mequanent</div>
        <div class="qr-number">+251 712 *** *78</div>
      </div>
    </div>

    <!-- QR Card -->
    <div class="qr-card">
      <div class="qr-seg">
        <button class="active" id="tabMy" onclick="setTab('my')">My Code</button>
        <button id="tabReceive" onclick="setTab('receive')">Request Amount</button>
      </div>

      <div class="qr-code-wrap">
        <canvas id="qrCanvas" width="180" height="180"></canvas>
        <div class="qr-logo-chip"><div class="m">M</div></div>
      </div>

      <div class="qr-amount" id="amountPill">
        <span>ETB</span>
        <input type="number" id="amountInput" placeholder="0.00" oninput="drawQR()">
      </div>

      <div class="qr-hint" id="qrHint">Show this code to receive money or payments instantly into your M-PESA wallet.</div>
    </div>

    <!-- Actions -->
    <div class="qr-actions">
      <button class="qr-btn secondary" onclick="showToast('Saved to gallery')">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save
      </button>
      <button class="qr-btn primary" onclick="showToast('Sharing QR code…')">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastText">Done</span>
  </div>
</div>

<script>
  // ---- Draw a realistic-looking QR code on canvas (decorative, deterministic) ----
  function drawQR() {
    const canvas = document.getElementById('qrCanvas');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const modules = 29;
    const cell = size / modules;
    ctx.clearRect(0, 0, size, size);
    ctx.fillStyle = '#1C1C21';

    // Seed includes the requested amount so the code "changes" per amount
    const amt = (document.getElementById('amountInput').value || '0');
    let seed = 0;
    for (const ch of ('aster' + amt)) seed = (seed * 31 + ch.charCodeAt(0)) >>> 0;
    function rand() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

    const isFinder = (r, c) =>
      (r < 7 && c < 7) || (r < 7 && c >= modules - 7) || (r >= modules - 7 && c < 7);
    const inCenter = (r, c) => r >= 12 && r <= 16 && c >= 12 && c <= 16;

    // Data modules
    for (let r = 0; r < modules; r++) {
      for (let c = 0; c < modules; c++) {
        if (isFinder(r, c) || inCenter(r, c)) continue;
        if (rand() > 0.52) ctx.fillRect(c * cell, r * cell, cell + 0.5, cell + 0.5);
      }
    }

    // Finder patterns (3 corners)
    function finder(or, oc) {
      ctx.fillStyle = '#1C1C21';
      ctx.fillRect(oc * cell, or * cell, 7 * cell, 7 * cell);
      ctx.fillStyle = '#fff';
      ctx.fillRect((oc + 1) * cell, (or + 1) * cell, 5 * cell, 5 * cell);
      ctx.fillStyle = '#1C1C21';
      ctx.fillRect((oc + 2) * cell, (or + 2) * cell, 3 * cell, 3 * cell);
    }
    finder(0, 0); finder(0, modules - 7); finder(modules - 7, 0);
  }

  function setTab(which) {
    const my = which === 'my';
    document.getElementById('tabMy').classList.toggle('active', my);
    document.getElementById('tabReceive').classList.toggle('active', !my);
    document.getElementById('amountPill').classList.toggle('show', !my);
    document.getElementById('qrHint').textContent = my
      ? 'Show this code to receive money or payments instantly into your M-PESA wallet.'
      : 'Enter an amount, then let the sender scan this code to pay you exactly.';
    drawQR();
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastText').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function goBack() {
    window.location.href = 'Lehulum Home.html';
  }

  drawQR();
</script>

<!-- Export to Figma button (shared exporter) -->
<script src="figma-export.js"></script>
</body>
</html>
