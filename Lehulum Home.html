  // ============================================================
  // Listen for test scenario popups from parent (index.html)
  // ============================================================
  window.addEventListener('message', function(event) {
    // Only accept messages from the same origin
    if (event.data && event.data.type === 'showTestPopup') {
      showTestPopupInline(event.data.html, event.data.css || '');
    }
  });

  function showTestPopupInline(html, css) {
    // Remove any previous test popup
    const existing = document.getElementById('testPopupInline');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.id = 'testPopupInline';
    container.innerHTML = (css ? `<style>${css}</style>` : '') + html;
    document.body.appendChild(container);
  }
</script>

  // Component registry: which template goes into which container
  const componentMap = [
    { container: 'statusBarContainer', template: 'statusBar' },
    { container: 'welcomeAppBarContainer', template: 'welcomeAppBar' },
    { container: 'balanceCardContainer', template: 'balanceCard' },
    { container: 'actionsContainer', template: 'actions' },
    { container: 'bannerSliderContainer', template: 'bannerSlider' },
    { container: 'recentTransactionsContainer', template: 'recentTransactions' },
    { container: 'qrPopupContainer', template: 'qrPopup' }
  ];

  function renderApp() {
    // 1. Render phone frame with placeholder containers
    document.getElementById('app').innerHTML = componentTemplates.phone;

    // 2. Render each component into its container
    componentMap.forEach(({ container, template }) => {
      const el = document.getElementById(container);
      if (el) el.innerHTML = componentTemplates[template];
    });

    // 3. Initialize Lucide icons
    if (typeof lucide !== 'undefined' && lucide.createIcons) {
      lucide.createIcons();
    }

    // 4. Initialize eye toggle
    const eyeBtn = document.getElementById('eyeBtn');
    const eyeIcon = document.getElementById('eyeIcon');
    const balanceCard = document.getElementById('balanceCard');
    const mainBalance = document.getElementById('mainBalance');
    const rewardBalance = document.getElementById('rewardBalance');
    const errifBalance = document.getElementById('errifBalance');

    if (eyeBtn && eyeIcon && balanceCard && mainBalance && rewardBalance && errifBalance) {
      let isVisible = false;

      const eyeOffSvg = '<svg viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19.5C7 19.5 2.73 16.39 1 12C2.73 7.61 7 4.5 12 4.5C14.12 4.5 16.07 5.2 17.62 6.38" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12C15 13.66 13.66 15 12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>';
      const eyeOnSvg = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      eyeBtn.addEventListener('click', function() {
        isVisible = !isVisible;
        if (isVisible) {
          mainBalance.textContent = mainBalance.dataset.value;
          rewardBalance.textContent = rewardBalance.dataset.value;
          errifBalance.textContent = errifBalance.dataset.value;
          balanceCard.classList.add('balance-visible');
          eyeIcon.innerHTML = eyeOffSvg;
          eyeBtn.title = 'Hide balances';
        } else {
          mainBalance.textContent = '* * * * * * * *';
          rewardBalance.textContent = '****';
          errifBalance.textContent = '****';
          balanceCard.classList.remove('balance-visible');
          eyeIcon.innerHTML = eyeOnSvg;
          eyeBtn.title = 'Show balances';
        }
      });
    }

    // 5. Initialize Banner Slider
    initBannerSlider();

    // 6. Initialize QR FAB Speed-dial
    initQrFab();
  }

  // Banner Slider Functionality
  function initBannerSlider() {
    const slides = document.querySelectorAll('.banner-slide');
    const dots = document.querySelectorAll('.banner-dot, .dot');
    let currentSlide = 0;
    let slideInterval;

    function goToSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.remove('active');
        if (dots[i]) dots[i].classList.remove('active');
      });
      
      slides[index].classList.add('active');
      if (dots[index]) dots[index].classList.add('active');
      currentSlide = index;
    }

    function nextSlide() {
      const next = (currentSlide + 1) % slides.length;
      goToSlide(next);
    }

    function startAutoSlide() {
      slideInterval = setInterval(nextSlide, 4000);
    }

    function stopAutoSlide() {
      clearInterval(slideInterval);
    }

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => {
        goToSlide(index);
        stopAutoSlide();
        startAutoSlide();
      });
    });

    let touchStartX = 0;
    let touchEndX = 0;
    const sliderContainer = document.getElementById('bannerSlidesContainer');
    
    if (sliderContainer) {
      sliderContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        stopAutoSlide();
      }, {passive: true});

      sliderContainer.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
        startAutoSlide();
      }, {passive: true});
    }

    function handleSwipe() {
      const swipeThreshold = 50;
      const diff = touchStartX - touchEndX;
      
      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
          nextSlide();
        } else {
          const prev = (currentSlide - 1 + slides.length) % slides.length;
          goToSlide(prev);
        }
      }
    }

    startAutoSlide();

    const bannerSlider = document.querySelector('.banner-slider');
    if (bannerSlider) {
      bannerSlider.addEventListener('mouseenter', stopAutoSlide);
      bannerSlider.addEventListener('mouseleave', startAutoSlide);
    }
  }

  // QR FAB Speed-Dial Functionality
  function initQrFab() {
    const wrapper = document.getElementById('qrFabWrapper');
    const btn = document.getElementById('qrFabBtn');
    const backdrop = document.getElementById('qrFabBackdrop');
    if (!wrapper || !btn) return;

    let isOpen = false;

    function openMenu() {
      isOpen = true;
      wrapper.classList.add('open');
      btn.setAttribute('aria-expanded', 'true');
    }

    function closeMenu() {
      isOpen = false;
      wrapper.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      isOpen ? closeMenu() : openMenu();
    });

    if (backdrop) {
      backdrop.addEventListener('click', closeMenu);
    }

    const myQrEl = document.getElementById('qrActionMyQR');
    if (myQrEl) {
      myQrEl.addEventListener('click', function() {
        closeMenu();
        window.location.href = 'My QR Code.html';
      });
    }

    const scanEl = document.getElementById('qrActionScan');
    if (scanEl) {
      scanEl.addEventListener('click', function() {
        closeMenu();
        window.location.href = 'Scan QR.html';
      });
    }

    const verifyEl = document.getElementById('qrActionVerify');
    if (verifyEl) {
      verifyEl.addEventListener('click', function() {
        closeMenu();
        window.location.href = 'Verify Receipt.html';
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && isOpen) closeMenu();
    });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    renderApp();
  } else {
    document.addEventListener('DOMContentLoaded', renderApp);
  }
</script>
