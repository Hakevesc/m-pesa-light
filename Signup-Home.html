<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  /* ===== POPUP OVERLAY ===== */
  .signup-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: overlayFadeIn 0.25s ease;
  }
  @keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }

  .signup-modal {
    background: #FFF; border-radius: 24px;
    padding: 32px 24px 28px;
    width: 320px; max-width: 100%;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.30);
    position: relative;
    animation: modalPopIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalPopIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);     }
  }

  /* Close button (fingerprint popup only) */
  .popup-close-btn {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .popup-close-btn:hover { background: #F0F0F0; }
  .popup-close-btn svg { width: 20px; height: 20px; stroke: #7C7C87; stroke-width: 2; }

  /* Progress bar */
  .popup-progress { width: 80px; height: 6px; background: #E8E8EC; border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
  .popup-progress-fill { height: 100%; width: 0; background: #1FC83B; border-radius: 3px; animation: progressFill 0.9s ease-out 0.2s forwards; }
  @keyframes progressFill { to { width: 65%; } }

  /* Success icon (fingerprint popup) */
  .popup-success-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: #E8F9EC; border: 2px solid #1FC83B;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .popup-success-icon svg { width: 32px; height: 32px; stroke: #1FC83B; stroke-width: 2.5px; fill: none; }

  /* Title & subtitle */
  .popup-title {
    color: #1C1C21; font-family: 'Switzer', sans-serif;
    font-size: 22px; font-weight: 700; margin-bottom: 10px; line-height: 1.3;
  }
  .popup-subtitle {
    color: #7C7C87; font-family: 'Switzer', sans-serif;
    font-size: 14px; font-weight: 400; line-height: 1.6;
    margin-bottom: 22px; padding: 0 4px;
  }

  /* User card (PIN popup) */
  .popup-user-card {
    width: 100%; background: #F8F8FA; border-radius: 16px;
    padding: 14px 16px; display: flex; align-items: center;
    gap: 12px; margin-bottom: 22px; text-align: left;
  }
  .popup-user-avatar {
    width: 46px; height: 46px; border-radius: 50%; overflow: hidden;
    flex-shrink: 0; border: 2px solid #FFF;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    background: #DDD; display: flex; align-items: center; justify-content: center;
    font-family: 'Switzer', sans-serif; font-size: 16px; font-weight: 700; color: #FFF;
  }
  .popup-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .popup-user-info { flex: 1; }
  .popup-user-name { font-family: 'Switzer', sans-serif; font-size: 14px; font-weight: 600; color: #1C1C21; }
  .popup-user-status { font-family: 'Switzer', sans-serif; font-size: 12px; color: #7C7C87; margin-top: 2px; }
  .popup-user-status .confirmed { color: #1FC83B; font-weight: 600; }
  .popup-fayda-logo {
    width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: #FFF; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .popup-fayda-logo img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }

  /* Popup buttons */
  .popup-btn-primary {
    width: 100%; height: 48px; border-radius: 14px; border: none;
    background: #FE353D; color: #FFF1F2; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(254,53,61,0.25);
    transition: all 0.2s; margin-bottom: 0;
  }
  .popup-btn-primary:hover { background: #E5303A; transform: translateY(-1px); }
  .popup-btn-primary:active { transform: scale(0.98); }
  .popup-btn-primary.dark {
    background: #1C1C21; box-shadow: 0 4px 12px rgba(28,28,33,0.2);
  }
  .popup-btn-primary.dark:hover { background: #2C2C31; }

  .popup-btn-secondary {
    width: 100%; height: 48px; border-radius: 14px; border: none;
    background: #F0F0F2; color: #7C7C87; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    transition: all 0.2s; margin-top: 10px;
  }
  .popup-btn-secondary:hover { background: #E5E5E8; color: #1C1C21; }

  .popup-actions { width: 100%; display: flex; flex-direction: column; }
</style>
</head>

<script>
  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'showTestPopup') {
      const existing = document.getElementById('testPopupInline');
      if (existing) existing.remove();
      const container = document.createElement('div');
      container.id = 'testPopupInline';
      container.innerHTML = (event.data.css ? `<style>${event.data.css}</style>` : '') + event.data.html;
      document.body.appendChild(container);
    }
  });
</script>

  const componentMap = [

    { container: 'actionsContainer',          template: 'actions' },
    { container: 'bannerSliderContainer',     template: 'bannerSlider' },

    { container: 'qrPopupContainer',          template: 'qrPopup' }

  function renderApp() {
    document.getElementById('app').innerHTML = componentTemplates.phone;
    componentMap.forEach(({ container, template }) => {
      const el = document.getElementById(container);
      if (el) el.innerHTML = componentTemplates[template];
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();

    // Eye toggle
    const eyeBtn = document.getElementById('eyeBtn');
    const eyeIcon = document.getElementById('eyeIcon');
    const balanceCard = document.getElementById('balanceCard');
    const mainBalance = document.getElementById('mainBalance');
    const rewardBalance = document.getElementById('rewardBalance');
    const errifBalance = document.getElementById('errifBalance');
    if (eyeBtn) {
      let isVisible = false;
      const eyeOffSvg = '<svg viewBox="0 0 24 24" fill="none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19.5C7 19.5 2.73 16.39 1 12C2.73 7.61 7 4.5 12 4.5C14.12 4.5 16.07 5.2 17.62 6.38" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12C15 13.66 13.66 15 12 15C10.34 15 9 13.66 9 12C9 10.34 10.34 9 12 9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>';
      const eyeOnSvg = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      eyeBtn.addEventListener('click', function() {
        isVisible = !isVisible;
        if (isVisible) {
          mainBalance.textContent = mainBalance.dataset.value;
          rewardBalance.textContent = rewardBalance.dataset.value;
          errifBalance.textContent = errifBalance.dataset.value;
          balanceCard.classList.add('balance-visible');
          eyeIcon.innerHTML = eyeOffSvg;
        } else {
          mainBalance.textContent = '* * * * * * * *';
          rewardBalance.textContent = '****';
          errifBalance.textContent = '****';
          balanceCard.classList.remove('balance-visible');
          eyeIcon.innerHTML = eyeOnSvg;
        }
      });
    }

    initBannerSlider();
    initQrFab();
  }

  function initBannerSlider() {
    const slides = document.querySelectorAll('.banner-slide');
    const dots = document.querySelectorAll('.banner-dot, .dot');
    let currentSlide = 0, slideInterval;
    function goToSlide(index) {
      slides.forEach((s, i) => { s.classList.remove('active'); if (dots[i]) dots[i].classList.remove('active'); });
      slides[index].classList.add('active');
      if (dots[index]) dots[index].classList.add('active');
      currentSlide = index;
    }
    function nextSlide() { goToSlide((currentSlide + 1) % slides.length); }
    function start() { slideInterval = setInterval(nextSlide, 4000); }
    function stop() { clearInterval(slideInterval); }
    dots.forEach((d, i) => d.addEventListener('click', () => { goToSlide(i); stop(); start(); }));
    let tx = 0, te = 0;
    const sc = document.getElementById('bannerSlidesContainer');
    if (sc) {
      sc.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; stop(); }, { passive: true });
      sc.addEventListener('touchend', e => { te = e.changedTouches[0].screenX; if (Math.abs(tx - te) > 50) { tx - te > 0 ? nextSlide() : goToSlide((currentSlide - 1 + slides.length) % slides.length); } start(); }, { passive: true });
    }
    start();
    const bs = document.querySelector('.banner-slider');
    if (bs) { bs.addEventListener('mouseenter', stop); bs.addEventListener('mouseleave', start); }
  }

  function initQrFab() {
    const wrapper = document.getElementById('qrFabWrapper');
    const btn = document.getElementById('qrFabBtn');
    const backdrop = document.getElementById('qrFabBackdrop');
    if (!wrapper || !btn) return;
    let isOpen = false;
    function openMenu() { isOpen = true; wrapper.classList.add('open'); btn.setAttribute('aria-expanded', 'true'); }
    function closeMenu() { isOpen = false; wrapper.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
    btn.addEventListener('click', e => { e.stopPropagation(); isOpen ? closeMenu() : openMenu(); });
    if (backdrop) backdrop.addEventListener('click', closeMenu);
    document.getElementById('qrActionMyQR')?.addEventListener('click', () => { closeMenu(); window.location.href = 'My QR Code.html'; });
    document.getElementById('qrActionScan')?.addEventListener('click', () => { closeMenu(); window.location.href = 'Scan QR.html'; });
    document.getElementById('qrActionVerify')?.addEventListener('click', () => { closeMenu(); window.location.href = 'Verify Receipt.html'; });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && isOpen) closeMenu(); });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    renderApp();
    initSignupFlow();
  } else {
    document.addEventListener('DOMContentLoaded', () => { renderApp(); initSignupFlow(); });
  }
</script>

<!-- ===== SIGNUP FLOW POPUP LOGIC ===== -->
<script>
  function initSignupFlow() {
    const pinDone = sessionStorage.getItem('signupPinDone');
    if (pinDone === 'true') {
      showFingerprintPopup();
    } else {
      showPinSetupPopup();
    }
  }

  function removePopup() {
    const el = document.getElementById('signupPopup');
    if (el) {
      el.style.animation = 'overlayFadeIn 0.2s ease reverse';
      setTimeout(() => el.remove(), 180);
    }
  }

  /* ─── PIN Setup Popup ─── */
  function showPinSetupPopup() {
    const overlay = document.createElement('div');
    overlay.id = 'signupPopup';
    overlay.className = 'signup-overlay';
    overlay.innerHTML = `
      <div class="signup-modal">

          </div>
          <div class="popup-user-info">

  function goToCreatePin() {

  /* ─── Enable Fingerprint Popup ─── */

            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>

        <div class="popup-success-icon">

            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <h2 class="popup-title">You're All Set!</h2>
        <p class="popup-subtitle">
          Your M-PESA account has been successfully activated.
          Welcome to convenient payments.
        </p>

        <div class="popup-actions">
          <button class="popup-btn-primary dark" onclick="enableFingerprint()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;flex-shrink:0;">
              <path d="M12 2a10 10 0 0 0-7.07 2.93"/>
              <path d="M17.07 4.93A10 10 0 0 1 22 12"/>
              <path d="M12 7a5 5 0 0 0-3.54 1.46"/>

              <path d="M19 12a7 7 0 0 0-7-7"/>
              <path d="M5 12c0 1.93.78 3.68 2.05 4.95"/>
              <path d="M16.95 16.95A7 7 0 0 1 12 19"/>
              <path d="M12 19v-4"/>
            </svg>
            Enable Fingerprint Sign-In

          <button class="popup-btn-secondary" onclick="goToHome()">Remind me later</button>
        </div>

      </div>
    `;
    document.body.appendChild(overlay);
  }

  function enableFingerprint() {
    removePopup();
    window.location.href = 'FingerPrint Login Setup.html';
  }

  function goToHome() {
    removePopup();
    window.location.href = 'Lehulum Home.html';
  }
</script>
