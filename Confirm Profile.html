<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Your Profile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&family=Barlow:wght@400&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --Primary-Dark: #C41520;
    --Primary-Darker: #A41016;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Surface-Container: #FCFCFC;
    --Gray-0: #FFF;
    --On-Primary: #FFF1F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 360px;
    height: 780px;
    background: #F5F5F5;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .app-content {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Status Bar */
  .status-bar {
    flex-shrink: 0;
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 14px 24px 8px;
    background: #F5F5F5;
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  /* Header Navigation */
  .header-nav {
    flex-shrink: 0;
    position: relative;
    z-index: 5;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px 0;
    background: #F5F5F5;
  }

  .back-btn {
    position: absolute;
    left: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover {
    background: rgba(0,0,0,0.05);
    border-radius: 50%;
    transform: scale(1.05);
  }

  .back-btn svg {
    width: 24px;
    height: 24px;
    stroke: var(--On-Surface);
    stroke-width: 1.5px;
  }

  .header-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* Scrollable Content Area */
  .scrollable-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .scrollable-content::-webkit-scrollbar { width: 0; }

  /* Profile Section */
  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }

  .profile-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid var(--Primary);
    overflow: hidden;
    margin-bottom: 12px;
    background: #FFF;
  }

  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .profile-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
    text-align: center;
  }

  .profile-phone {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 400;
  }

  /* Form Card */
  .form-card {
    width: 100%;
    max-width: 328px;
    background: #FFF;
    border-radius: 24px;
    padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 24px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-field label {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .form-field input,
  .form-field .field-value {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-bottom: 1px solid #E0E0E0;
    padding: 8px 0;
    outline: none;
    background: transparent;
    width: 100%;
  }

  .form-field input:focus {
    border-bottom-color: var(--Primary);
  }

  /* Bottom Button Container */
  .bottom-btn-container {
    flex-shrink: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: center;
    background: #F5F5F5;
  }

  /* Confirm Button */
  .confirm-btn {
    display: flex;
    width: 328px;
    max-width: 100%;
    height: 48px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    border-radius: 12px;
    background: var(--Primary, #FE353D);
    color: var(--On-Primary, #FFF1F2);
    text-align: center;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-style: normal;
    font-weight: 500;
    line-height: 1.5;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(254, 53, 61, 0.25);
  }

  .confirm-btn:hover {
    background: #E5303A;
    box-shadow: 0 6px 20px rgba(254, 53, 61, 0.35);
    transform: translateY(-1px);
  }

  .confirm-btn:active {
    transform: scale(0.98) translateY(0);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <!-- Status Bar (fixed top) -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/>
          <rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/>
          <rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/>
          <rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12.55a11 11 0 0 1 14.08 0" stroke="#1C1C21" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M1.42 9a16 16 0 0 1 21.16 0" stroke="#1C1C21" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" stroke="#1C1C21" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke="#1C1C21" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg viewBox="0 0 28 14" fill="none">
          <rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/>
          <rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/>
          <rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/>
        </svg>
      </div>
    </div>

    <!-- Header Navigation (fixed top) -->
    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="header-title">Confirm Your Profile</span>
    </div>

    <!-- Scrollable Content Area -->
    <div class="scrollable-content">

      <!-- Profile Section -->
      <div class="profile-section">
        <div class="profile-avatar">
          <img src="assets/avatars/avatar-1.png" alt="Profile">
        </div>
        <h2 class="profile-name">Zemedkun Kidane</h2>
        <p class="profile-phone">Phone Number 079 123 1222</p>
      </div>

      <!-- Form Card -->
      <div class="form-card">
        <div class="form-field">
          <label>Full Name</label>
          <div class="field-value">Mikias Dereje</div>
        </div>

        <div class="form-field">
          <label>Phone Number</label>
          <div class="field-value">0911032052</div>
        </div>

        <div class="form-field">
          <label>Address</label>
          <div class="field-value">Avenue 2001, n23 Ethiopia</div>
        </div>

        <div class="form-field">
          <label>Birthdate</label>
          <div class="field-value">12/27/2027</div>
        </div>

        <div class="form-field">
          <label>Nationality</label>
          <div class="field-value">Ethiopian</div>
        </div>

        <div class="form-field">
          <label>Gender</label>
          <div class="field-value">Male</div>
        </div>
      </div>

    </div>

    <!-- Bottom Button Container (sticky at bottom) -->
    <div class="bottom-btn-container">
      <button class="confirm-btn" onclick="confirmProfile()">Confirm</button>
    </div>

  </div>
</div>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  // Initialize Lucide icons
  lucide.createIcons();

  // Go back
  function goBack() {
    if (confirm('Go back to previous screen?')) {
      alert('Navigating back...');
    }
  }

  function confirmProfile() {
    window.location.href = 'Signup-Home.html';
  }
</script>


<!-- Export to Figma button (shared exporter) -->
<script src="figma-export.js"></script>
</body>
</html>
