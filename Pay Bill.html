<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Bill</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Gray-0: #FFF;
    --Border: #E8E8EC;
    --Background: #F5F5F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 360px;
    height: 780px;
    background: var(--Background);
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .app-content {
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px 8px;
    background: var(--Background);
    flex-shrink: 0;
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  .header-nav {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 12px;
    background: var(--Background);
    flex-shrink: 0;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.05); }
  .back-btn svg { width: 22px; height: 22px; stroke: var(--On-Surface); stroke-width: 1.8px; fill: none; }

  .header-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.3px;
    flex: 1;
    text-align: center;
  }

  /* Search Bar */
  .search-bar {
    background: #FFF;
    border-radius: 14px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 46px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .search-bar svg { width: 18px; height: 18px; stroke: var(--On-Surface-Low); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    color: var(--On-Surface);
    background: transparent;
  }
  .search-bar input::placeholder { color: var(--On-Surface-Low); }

  /* Section */
  .section-label {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.2px;
  }

  /* Category Grid */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }

  .category-card {
    background: #FFF;
    border-radius: 14px;
    padding: 14px 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    border: 1.5px solid transparent;
  }
  .category-card:hover { background: #FFF5F5; border-color: rgba(254,53,61,0.15); transform: translateY(-1px); }
  .category-card:active { transform: scale(0.96); }

  .category-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .category-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 1.8px; }

  .category-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
  }

  /* Recent Billers */
  .recent-card {
    background: #FFF;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 20px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .card-header .title { font-family: 'Switzer', sans-serif; font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .card-header .see-all { font-family: 'Switzer', sans-serif; font-size: 12px; font-weight: 500; color: var(--Primary); cursor: pointer; }

  .biller-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s;
  }
  .biller-item:hover { background: #FAFAFA; padding-left: 6px; padding-right: 6px; margin: 0 -6px; }
  .biller-item + .biller-item { border-top: 1px solid #F5F5F5; }

  .biller-logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .biller-logo img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
  .biller-logo .fallback {
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--On-Surface);
  }

  .biller-info { flex: 1; }
  .biller-name { font-family: 'Switzer', sans-serif; font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .biller-sub { font-family: 'Switzer', sans-serif; font-size: 12px; color: var(--On-Surface-Low); margin-top: 2px; }

  .biller-arrow { width: 18px; height: 18px; stroke: #C5C5CB; flex-shrink: 0; }

  /* Favorites */
  .favorites-section {
    width: 100%;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .fav-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .fav-header .title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .fav-header .see-all {
    color: var(--Primary);
    font-family: 'Switzer', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .fav-header .see-all:hover { opacity: 0.7; }

  .favorites-scroll {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .favorites-scroll::-webkit-scrollbar { display: none; }

  .fav-item {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .fav-item:hover { transform: scale(1.05); }
  .fav-item:active { transform: scale(0.95); }

  .fav-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 2.5px solid #FFF;
  }

  .fav-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    max-width: 64px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#1C1C21"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#1C1C21"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#1C1C21"/></svg>
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/></svg>
        <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/></svg>
      </div>
    </div>

    <!-- Header -->
    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="header-title">Pay Bill</span>
      <div style="width:36px;"></div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search billers..." oninput="filterBillers(this.value)">
    </div>

    <!-- Favorites -->
    <div class="favorites-section">
      <div class="fav-header">
        <span class="title">Favorites</span>
        <span class="see-all">See All</span>
      </div>
      <div class="favorites-scroll">

        <div class="fav-item" onclick="selectBiller('EEPCO','Meter No. 4523061','Utility')">
          <div class="fav-avatar" style="background:#FFF3E0;color:#F57C00;">EP</div>
          <span class="fav-name">EEPCO</span>
        </div>

        <div class="fav-item" onclick="selectBiller('Ethio Telecom','Postpaid • 0911234567','Telecom')">
          <div class="fav-avatar" style="background:#E8F5E9;color:#388E3C;">ET</div>
          <span class="fav-name">Ethio Telecom</span>
        </div>

        <div class="fav-item" onclick="selectBiller('AAWSA','Account No. 78341','Water')">
          <div class="fav-avatar" style="background:#E3F2FD;color:#1976D2;">AW</div>
          <span class="fav-name">AAWSA</span>
        </div>

        <div class="fav-item" onclick="selectBiller('Awash Insurance','Policy No. 10042','Insurance')">
          <div class="fav-avatar" style="background:#FCE4EC;color:#C2185B;">AI</div>
          <span class="fav-name">Awash Ins.</span>
        </div>

        <div class="fav-item" onclick="selectBiller('NBE Fine','Ref No. 88712','Government')">
          <div class="fav-avatar" style="background:#F3E5F5;color:#7B1FA2;">NB</div>
          <span class="fav-name">NBE Fine</span>
        </div>

      </div>
    </div>

    <!-- Categories -->
    <div class="section-label">Categories</div>
    <div class="category-grid">

      <div class="category-card" onclick="goToBiller('Utility')">
        <div class="category-icon" style="background:#FFF3E0;">
          <svg viewBox="0 0 24 24" stroke="#F57C00" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <span class="category-name">Utility</span>
      </div>

      <div class="category-card" onclick="goToBiller('Telecom')">
        <div class="category-icon" style="background:#E8F5E9;">
          <svg viewBox="0 0 24 24" stroke="#388E3C" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>
          </svg>
        </div>
        <span class="category-name">Telecom</span>
      </div>

      <div class="category-card" onclick="goToBiller('Water')">
        <div class="category-icon" style="background:#E3F2FD;">
          <svg viewBox="0 0 24 24" stroke="#1976D2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C6 10 4 14 4 16a8 8 0 0 0 16 0c0-2-2-6-8-14z"/>
          </svg>
        </div>
        <span class="category-name">Water</span>
      </div>

      <div class="category-card" onclick="goToBiller('Government')">
        <div class="category-icon" style="background:#F3E5F5;">
          <svg viewBox="0 0 24 24" stroke="#7B1FA2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 21 21 21 21 10"/><polyline points="3 10 3 21"/><polygon points="3 6 21 6 12 1 3 6"/>
          </svg>
        </div>
        <span class="category-name">Government</span>
      </div>

      <div class="category-card" onclick="goToBiller('Education')">
        <div class="category-icon" style="background:#E0F7FA;">
          <svg viewBox="0 0 24 24" stroke="#0097A7" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <span class="category-name">Education</span>
      </div>

      <div class="category-card" onclick="goToBiller('Insurance')">
        <div class="category-icon" style="background:#FCE4EC;">
          <svg viewBox="0 0 24 24" stroke="#C2185B" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="category-name">Insurance</span>
      </div>

    </div>

    <!-- Recent Billers -->
    <div class="recent-card">
      <div class="card-header">
        <span class="title">Recent Billers</span>
        <span class="see-all" onclick="goToBiller('All')">See all</span>
      </div>

      <div class="biller-item" onclick="selectBiller('EEPCO','Meter No. 4523061','Utility')">
        <div class="biller-logo">
          <div class="fallback" style="background:#FFF3E0;width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#F57C00;font-size:13px;">EP</div>
        </div>
        <div class="biller-info">
          <div class="biller-name">EEPCO</div>
          <div class="biller-sub">Meter No. 4523061</div>
        </div>
        <svg class="biller-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="biller-item" onclick="selectBiller('Ethio Telecom','Postpaid • 0911234567','Telecom')">
        <div class="biller-logo">
          <div class="fallback" style="background:#E8F5E9;width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#388E3C;font-size:13px;">ET</div>
        </div>
        <div class="biller-info">
          <div class="biller-name">Ethio Telecom</div>
          <div class="biller-sub">Postpaid • 0911234567</div>
        </div>
        <svg class="biller-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

      <div class="biller-item" onclick="selectBiller('AAWSA','Account No. 78341','Water')">
        <div class="biller-logo">
          <div class="fallback" style="background:#E3F2FD;width:100%;height:100%;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#1976D2;font-size:11px;">AW</div>
        </div>
        <div class="biller-info">
          <div class="biller-name">AAWSA</div>
          <div class="biller-sub">Account No. 78341</div>
        </div>
        <svg class="biller-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>

    </div>

  </div>
</div>

<script>
  function goBack() {
    window.location.href = 'Lehulum Home.html';
  }

  function goToBiller(category) {
    sessionStorage.setItem('billCategory', category);
    window.location.href = 'Bill Payment_Select Biller.html';
  }

  function selectBiller(name, sub, category) {
    sessionStorage.setItem('selectedBiller', JSON.stringify({ name, sub, category }));
    window.location.href = 'Bill Payment_Enter Account.html';
  }

  function filterBillers(query) {
    console.log('Filter:', query);
  }
</script>

<script src="figma-export.js"></script>
</body>
</html>
