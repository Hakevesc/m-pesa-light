<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer to Bank - Enter Amount</title>
<style>
    @import url("styles/component-keypad.css");
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --Primary-Dark: #C41520;
    --Primary-Darker: #A41016;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Surface-Container: #FCFCFC;
    --Gray-0: #FFF;
    --On-Primary: #FFF1F2;
    --Success: #1FC83B;
    --Success-Light: #E8F9EC;
    --Warning: #FF9800;
    --Warning-Light: #FFF8E1;
    --Border: #E8E8EC;
    --Background: #F5F5F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 360px;
    height: 780px;
    background: var(--Background);
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .app-content {
    height: 100%;
    overflow-y: auto;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  /* Status Bar (like Lehulum Home) */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 14px 24px 8px;
    background: var(--Background);
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  /* Header Navigation (like Manage Statement) */
  .header-nav {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
    background: var(--Background);
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.05); }
  .back-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--On-Surface);
    stroke-width: 1.8px;
  }

  .header-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.3px;
    flex: 1;
    text-align: center;
  }

  /* Main Content */
  .main-content {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
    width: 100%;
    gap: 20px;
  }

  /* Receiver Card */
  .receiver-card {
    background: #FFF;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  .receiver-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #E8E8EC;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'Switzer', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--On-Surface);
  }

  .receiver-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .receiver-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .receiver-bank {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .receiver-bank-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    overflow: hidden;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .receiver-bank-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
  }

  /* Amount Display */
  .amount-section {
    text-align: center;
    padding: 8px 0;
  }

  .amount-display {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .amount-value {
    font-family: 'Switzer', sans-serif;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--On-Surface);
    transition: color 0.2s;
  }

  .amount-value.insufficient {
    color: var(--Primary);
  }

  .amount-currency {
    font-family: 'Switzer', sans-serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--On-Surface-Low);
    padding-left: 4px;
    border-left: 2px solid var(--Border);
  }

  /* Balance Info - Main Balance & Available on one line */
  .balance-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
  }

  .balance-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 400;
  }

  .balance-item .label {
    color: var(--On-Surface-Low);
  }

  .balance-item .amount {
    font-weight: 600;
    color: var(--On-Surface);
  }

  .balance-divider {
    width: 1px;
    height: 14px;
    background: var(--Border);
  }

  /* Insufficient Balance Warning - no bg, no padding */
  .insufficient-warning {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 12px;
  }

  .insufficient-warning.show {
    display: flex;
  }

  .warning-icon {
    width: 16px;
    height: 16px;
    color: var(--Primary);
    flex-shrink: 0;
  }

  .warning-text {
    color: var(--Primary);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 500;
  }

  /* Fee Display - no bg, no padding */
  .fee-display {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }

  .fee-display.show {
    display: flex;
  }

  .fee-label {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 400;
  }

  .fee-info-icon {
    width: 14px;
    height: 14px;
    color: var(--On-Surface-Low);
    cursor: pointer;
  }

  /* Keypad (matching Create PIN) */
  

  

  

  
  
  

  
  

  
  
  

  /* Transfer Button */
  .transfer-btn {
    height: 52px;
    border-radius: 14px;
    border: none;
    background: #E0E0E0;
    color: var(--On-Surface-Low);
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: not-allowed;
    transition: all 0.2s;
  }

  .transfer-btn.active {
    background: var(--Primary);
    color: #FFF;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(254, 53, 61, 0.25);
  }

  .transfer-btn.active:hover {
    background: #E5303A;
    box-shadow: 0 6px 20px rgba(254, 53, 61, 0.35);
    transform: translateY(-1px);
  }

  .transfer-btn.active:active {
    transform: scale(0.98) translateY(0);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <!-- Status Bar (like Lehulum Home) -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#1C1C21"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#1C1C21"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#1C1C21"/></svg>
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/></svg>
        <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/></svg>
      </div>
    </div>

    <!-- Header Navigation (like Manage Statement) -->
    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="header-title">Transfer to Bank</span>
      <div style="width: 36px;"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Receiver Card -->
      <div class="receiver-card">
        <div class="receiver-avatar">KB</div>
        <div class="receiver-info">
          <span class="receiver-name">Kidist Birhanu</span>
          <div class="receiver-bank">
            <span>Awash Bank</span>
            <span>•</span>
            <span>****56436</span>
          </div>
        </div>
        <div class="receiver-bank-icon">
          <img src="assets/banks logo/awass-bank.png" alt="Awash Bank" onerror="this.style.display='none'">
        </div>
      </div>

      <!-- Amount Section -->
      <div class="amount-section">
        <div class="amount-display">
          <span class="amount-value" id="amountValue">0.00</span>
          <span class="amount-currency">ETB</span>
        </div>

        <!-- Balance Info - Main Balance & Available on one line -->
        <div class="balance-info">
          <div class="balance-item">
            <span class="label">Main:</span>
            <span class="amount">12,580.00 Birr</span>
          </div>
          <div class="balance-divider"></div>
          <div class="balance-item">
            <span class="label">Available:</span>
            <span class="amount">800.00 Birr</span>
          </div>
        </div>

        <!-- Insufficient Balance Warning (no bg, no padding) -->
        <div class="insufficient-warning" id="insufficientWarning">
          <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span class="warning-text">Insufficient Balance: 800.00 Birr</span>
        </div>

        <!-- Fee Display (no bg, no padding) -->
        <div class="fee-display" id="feeDisplay">
          <span class="fee-label">Fee 5.00 ETB</span>
          <svg class="fee-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        </div>
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key delete" onclick="deleteKey()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </button>
      </div>

      <!-- Transfer Button -->
      <button class="transfer-btn" id="transferBtn" onclick="transferMoney()" disabled>Transfer</button>

    </div>

  </div>
</div>

<script>
  const availableBalance = 800.00;
  const transferFee = 5.00;
  let currentAmount = 0.00;

  // Format number with commas
  function formatNumber(num) {
    return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  // Update display
  function updateDisplay() {
    const amountValue = document.getElementById('amountValue');
    const insufficientWarning = document.getElementById('insufficientWarning');
    const feeDisplay = document.getElementById('feeDisplay');
    const transferBtn = document.getElementById('transferBtn');

    amountValue.textContent = formatNumber(currentAmount);

    // Check if amount exceeds balance
    if (currentAmount > availableBalance) {
      amountValue.classList.add('insufficient');
      insufficientWarning.classList.add('show');
      feeDisplay.classList.remove('show');
      transferBtn.classList.remove('active');
      transferBtn.disabled = true;
    } else if (currentAmount > 0 && currentAmount <= availableBalance) {
      amountValue.classList.remove('insufficient');
      insufficientWarning.classList.remove('show');
      feeDisplay.classList.add('show');
      transferBtn.classList.add('active');
      transferBtn.disabled = false;
    } else {
      amountValue.classList.remove('insufficient');
      insufficientWarning.classList.remove('show');
      feeDisplay.classList.remove('show');
      transferBtn.classList.remove('active');
      transferBtn.disabled = true;
    }
  }

  // Press key
  function pressKey(key) {
    // Prevent more than 2 decimal places
    const stringValue = currentAmount.toString();
    const decimalIndex = stringValue.indexOf('.');
    
    if (decimalIndex !== -1 && stringValue.length - decimalIndex >= 3) {
      return; // Already have 2 decimal places
    }

    // Prevent leading zeros after decimal
    if (stringValue.endsWith('.0') && key === '0') {
      return;
    }

    // If current amount is 0 and key is 0, do nothing
    if (currentAmount === 0 && key === '0') {
      return;
    }

    // If current amount is 0 and key is not 0, replace it
    if (currentAmount === 0) {
      currentAmount = parseFloat(key);
    } else {
      // Append the digit
      currentAmount = parseFloat(stringValue + key);
    }

    updateDisplay();
  }

  // Delete key
  function deleteKey() {
    const stringValue = currentAmount.toString();
    
    if (stringValue.length === 1) {
      currentAmount = 0.00;
    } else {
      currentAmount = parseFloat(stringValue.slice(0, -1));
    }
    
    updateDisplay();
  }

  // Transfer money
  function transferMoney() {
    if (currentAmount > 0 && currentAmount <= availableBalance) {
      window.location.href = 'Transfer_Enter PIN.html';
    }
  }

  // Go back
  function goBack() {
    console.log('Navigate back');
  }

  // Initialize
  updateDisplay();
</script>


<!-- Export to Figma button (shared exporter) -->
<script src="figma-export.js"></script>
</body>
</html>
