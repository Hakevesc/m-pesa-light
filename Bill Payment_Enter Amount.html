<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Payment - Enter Amount</title>
<style>
  @import url("styles/component-keypad.css");
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Border: #E8E8EC;
    --Background: #F5F5F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }

  .phone-frame {
    width: 360px; height: 780px;
    background: var(--Background); border-radius: 30px;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .app-content {
    height: 100%; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px; background: var(--Background);
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  .header-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 12px; background: var(--Background);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.05); }
  .back-btn svg { width: 22px; height: 22px; stroke: var(--On-Surface); stroke-width: 1.8px; fill: none; }
  .header-title {
    color: var(--On-Surface); font-family: 'Switzer', sans-serif;
    font-size: 17px; font-weight: 500; letter-spacing: 0.3px; flex: 1; text-align: center;
  }

  .main-content {
    padding: 8px 20px 20px;
    display: flex; flex-direction: column; flex: 1; gap: 16px;
  }

  /* Biller Receiver Card */
  .receiver-card {
    background: #FFF; border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .receiver-icon {
    width: 48px; height: 48px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-family: 'Switzer', sans-serif; font-size: 15px; font-weight: 700;
  }
  .receiver-info { flex: 1; }
  .receiver-name { font-family: 'Switzer', sans-serif; font-size: 15px; font-weight: 600; color: var(--On-Surface); }
  .receiver-sub {
    font-family: 'Switzer', sans-serif; font-size: 12px; color: var(--On-Surface-Low); margin-top: 2px;
  }

  /* Suggested amount pill */
  .suggested-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(254,53,61,0.07); border: 1px solid rgba(254,53,61,0.2);
    border-radius: 8px; padding: 4px 10px; cursor: pointer;
    transition: background 0.15s;
  }
  .suggested-pill:hover { background: rgba(254,53,61,0.12); }
  .suggested-pill svg { width: 14px; height: 14px; stroke: var(--Primary); }
  .suggested-pill span { font-family: 'Switzer', sans-serif; font-size: 12px; font-weight: 600; color: var(--Primary); }

  /* Amount Section */
  .amount-section { text-align: center; padding: 4px 0; }
  .amount-display {
    display: flex; align-items: baseline; justify-content: center; gap: 8px; margin-bottom: 8px;
  }
  .amount-value {
    font-family: 'Switzer', sans-serif; font-size: 54px; font-weight: 700;
    letter-spacing: -2px; line-height: 1; color: var(--On-Surface); transition: color 0.2s;
  }
  .amount-value.insufficient { color: var(--Primary); }
  .amount-currency {
    font-family: 'Switzer', sans-serif; font-size: 20px; font-weight: 500;
    color: var(--On-Surface-Low); padding-left: 4px; border-left: 2px solid var(--Border);
  }

  .balance-info {
    display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 10px;
  }
  .balance-item {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 400;
  }
  .balance-item .label { color: var(--On-Surface-Low); }
  .balance-item .amount { font-weight: 600; color: var(--On-Surface); }
  .balance-divider { width: 1px; height: 14px; background: var(--Border); }

  .insufficient-warning {
    display: none; align-items: center; justify-content: center; gap: 6px; margin-top: 10px;
  }
  .insufficient-warning.show { display: flex; }
  .warning-text { color: var(--Primary); font-family: 'Switzer', sans-serif; font-size: 13px; font-weight: 500; }

  .fee-display {
    display: none; align-items: center; justify-content: center; gap: 6px; margin-top: 8px;
  }
  .fee-display.show { display: flex; }
  .fee-label { color: var(--On-Surface-Low); font-family: 'Switzer', sans-serif; font-size: 13px; }

  /* Pay Button */
  .pay-btn {
    height: 52px; border-radius: 14px; border: none;
    background: #E0E0E0; color: var(--On-Surface-Low);
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 500;
    cursor: not-allowed; transition: all 0.2s;
  }
  .pay-btn.active {
    background: var(--Primary); color: #FFF; cursor: pointer;
    box-shadow: 0 4px 16px rgba(254,53,61,0.25);
  }
  .pay-btn.active:hover { background: #E5303A; transform: translateY(-1px); }
  .pay-btn.active:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#1C1C21"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#1C1C21"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#1C1C21"/></svg>
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/></svg>
        <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/></svg>
      </div>
    </div>

    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="header-title">Bill Payment</span>
      <div style="width:36px;"></div>
    </div>

    <div class="main-content">

      <!-- Receiver Card -->
      <div class="receiver-card">
        <div class="receiver-icon" id="billerIcon" style="background:#FFF3E0;color:#F57C00;">EP</div>
        <div class="receiver-info">
          <div class="receiver-name" id="billerName">EEPCO</div>
          <div class="receiver-sub" id="billerSub">Meter No. 4523061 • Abebe Girma</div>
        </div>
        <div class="suggested-pill" onclick="useSuggestedAmount()" id="suggestedPill" title="Use bill amount">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="suggestedAmountLabel">580.00</span>
        </div>
      </div>

      <!-- Amount Section -->
      <div class="amount-section">
        <div class="amount-display">
          <span class="amount-value" id="amountValue">0.00</span>
          <span class="amount-currency">ETB</span>
        </div>

        <div class="balance-info">
          <div class="balance-item">
            <span class="label">Main:</span>
            <span class="amount">12,580.00</span>
          </div>
          <div class="balance-divider"></div>
          <div class="balance-item">
            <span class="label">Available:</span>
            <span class="amount">800.00</span>
          </div>
        </div>

        <div class="insufficient-warning" id="insufficientWarning">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FE353D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12.01" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/>
          </svg>
          <span class="warning-text">Insufficient Balance: 800.00 Birr</span>
        </div>

        <div class="fee-display" id="feeDisplay">
          <span class="fee-label">Service fee: Free</span>
        </div>
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key delete" onclick="deleteKey()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>

      <button class="pay-btn" id="payBtn" onclick="proceed()" disabled>Pay Bill</button>

    </div>
  </div>
</div>

<script>
  const availableBalance = 800.00;
  let currentAmount = 0.00;
  let suggestedAmount = 580.00;

  // Load session data
  const payData = JSON.parse(sessionStorage.getItem('billPaymentData') || '{}');
  const biller = payData.biller || { abbr:'EP', bg:'#FFF3E0', color:'#F57C00', name:'EEPCO' };
  if (payData.billAmount) suggestedAmount = parseFloat(payData.billAmount);

  document.getElementById('billerIcon').textContent = biller.abbr || 'EP';
  document.getElementById('billerIcon').style.background = biller.bg || '#FFF3E0';
  document.getElementById('billerIcon').style.color = biller.color || '#F57C00';
  document.getElementById('billerName').textContent = biller.name || 'EEPCO';
  if (payData.account) {
    document.getElementById('billerSub').textContent = `Meter No. ${payData.account} • ${payData.customerName || 'Verified'}`;
  }
  document.getElementById('suggestedAmountLabel').textContent = suggestedAmount.toFixed(2);

  function formatNumber(num) {
    return num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function useSuggestedAmount() {
    currentAmount = suggestedAmount;
    updateDisplay();
  }

  function updateDisplay() {
    const amountEl = document.getElementById('amountValue');
    amountEl.textContent = formatNumber(currentAmount);
    const btn = document.getElementById('payBtn');
    const insuf = document.getElementById('insufficientWarning');
    const fee = document.getElementById('feeDisplay');

    if (currentAmount > availableBalance) {
      amountEl.classList.add('insufficient');
      insuf.classList.add('show');
      fee.classList.remove('show');
      btn.classList.remove('active'); btn.disabled = true;
    } else if (currentAmount > 0) {
      amountEl.classList.remove('insufficient');
      insuf.classList.remove('show');
      fee.classList.add('show');
      btn.classList.add('active'); btn.disabled = false;
    } else {
      amountEl.classList.remove('insufficient');
      insuf.classList.remove('show');
      fee.classList.remove('show');
      btn.classList.remove('active'); btn.disabled = true;
    }
  }

  function pressKey(key) {
    const str = currentAmount.toString();
    const dotIdx = str.indexOf('.');
    if (dotIdx !== -1 && str.length - dotIdx >= 3) return;
    if (currentAmount === 0) { currentAmount = parseFloat(key); }
    else { currentAmount = parseFloat(str + key); }
    updateDisplay();
  }

  function deleteKey() {
    const str = currentAmount.toString();
    currentAmount = str.length === 1 ? 0.00 : parseFloat(str.slice(0, -1));
    updateDisplay();
  }

  function proceed() {
    if (currentAmount > 0 && currentAmount <= availableBalance) {
      const data = JSON.parse(sessionStorage.getItem('billPaymentData') || '{}');
      data.payAmount = currentAmount.toFixed(2);
      sessionStorage.setItem('billPaymentData', JSON.stringify(data));
      window.location.href = 'Bill Payment_Enter PIN.html';
    }
  }

  function goBack() { window.location.href = 'Bill Payment_Enter Account.html'; }

  updateDisplay();
</script>

<script src="figma-export.js"></script>
</body>
</html>
