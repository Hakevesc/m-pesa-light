<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: var(--figma-color-bg, #ffffff);
    --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
    --text: var(--figma-color-text, #1a1a1a);
    --text-secondary: var(--figma-color-text-secondary, #888);
    --border: var(--figma-color-border, #e6e6e6);
    --brand: var(--figma-color-bg-brand, #0d99ff);
    --on-brand: var(--figma-color-text-onbrand, #ffffff);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
  }
  header .title { font-weight: 600; font-size: 12px; }
  header .count { color: var(--text-secondary); font-size: 11px; margin-left: auto; white-space: nowrap; }
  header .toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
  }
  header .toggle input { margin: 0; cursor: pointer; }
  .note {
    margin: 0 0 10px;
    padding: 6px 10px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font-size: 11px;
  }
  #content {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 10px 14px 14px;
  }
  .empty {
    color: var(--text-secondary);
    text-align: center;
    margin-top: 60px;
    line-height: 1.6;
  }
  .block { margin-bottom: 16px; }
  .block-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 8px;
  }
  .block-name {
    font-weight: 600;
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  pre {
    margin: 0;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.55;
    white-space: pre;
    overflow-x: auto;
    color: var(--text);
  }
  .sel { color: var(--brand); }
  .prop { color: #c0392b; }
  .val { color: var(--text); }
  .copy-btn {
    flex: 0 0 auto;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    cursor: pointer;
  }
  .copy-btn:hover { background: var(--bg-secondary); }
  .copy-btn.done { background: var(--brand); color: var(--on-brand); border-color: var(--brand); }
  footer {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  footer button {
    flex: 1;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }
  footer button.primary { background: var(--brand); color: var(--on-brand); border-color: var(--brand); }
  textarea.clip { position: fixed; left: -9999px; top: 0; opacity: 0; }
</style>
</head>
<body>
  <header>
    <span class="title">CSS Inspector</span>
    <label class="toggle"><input type="checkbox" id="children" checked /> Include child layers</label>
    <span class="count" id="count"></span>
  </header>

  <div id="content">
    <div class="empty" id="empty">Select a layer or component<br/>on the canvas to see its CSS.</div>
  </div>

  <footer>
    <button id="copyAll" class="primary">Copy all</button>
    <button id="refresh">Refresh</button>
  </footer>

  <textarea class="clip" id="clip"></textarea>

<script>
  var content = document.getElementById('content');
  var empty = document.getElementById('empty');
  var countEl = document.getElementById('count');
  var clip = document.getElementById('clip');
  var childrenToggle = document.getElementById('children');
  var blocksData = [];

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Build the plain-text CSS rule for copying. Prefix the layer path as a
  // comment so a copied stylesheet still shows where each rule came from.
  function ruleText(b) {
    var comment = b.path ? '/* ' + b.path + ' */\n' : '';
    return comment + b.selector + ' {\n' + b.props.map(function (p) { return '  ' + p; }).join('\n') + '\n}';
  }

  // Syntax-highlighted version for display.
  function ruleHtml(b) {
    var head = '<span class="sel">' + escapeHtml(b.selector) + '</span> {\n';
    var body = b.props.map(function (p) {
      var idx = p.indexOf(':');
      if (idx === -1) return '  ' + escapeHtml(p);
      var prop = p.slice(0, idx);
      var val = p.slice(idx + 1).replace(/;$/, '');
      return '  <span class="prop">' + escapeHtml(prop) + '</span>:<span class="val">' + escapeHtml(val) + '</span>;';
    }).join('\n');
    return head + body + '\n}';
  }

  function copyText(text, btn) {
    clip.value = text;
    clip.select();
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    window.getSelection().removeAllRanges();
    if (btn) {
      var prev = btn.textContent;
      btn.textContent = ok ? 'Copied' : 'Press Ctrl+C';
      btn.classList.add('done');
      setTimeout(function () { btn.textContent = prev; btn.classList.remove('done'); }, 1200);
    }
  }

  function render(msg) {
    var blocks = msg.blocks;
    blocksData = blocks;
    content.innerHTML = '';
    if (!blocks.length) {
      content.appendChild(empty);
      countEl.textContent = '';
      return;
    }
    countEl.textContent = blocks.length + (blocks.length === 1 ? ' layer' : ' layers');

    if (msg.truncated) {
      var note = document.createElement('div');
      note.className = 'note';
      note.textContent = 'Large selection — showing the first ' + blocks.length + ' layers. Select a smaller group for the rest.';
      content.appendChild(note);
    }

    blocks.forEach(function (b, i) {
      var wrap = document.createElement('div');
      wrap.className = 'block';
      // Indent nested layers so the tree structure is visible at a glance.
      if (b.depth) wrap.style.marginLeft = Math.min(b.depth, 6) * 12 + 'px';

      var head = document.createElement('div');
      head.className = 'block-head';

      var nameEl = document.createElement('span');
      nameEl.className = 'block-name';
      nameEl.textContent = b.header;
      if (b.path) nameEl.title = b.path;

      var copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = (function (block, btn) {
        return function () { copyText(ruleText(block), btn); };
      })(b, copyBtn);

      head.appendChild(nameEl);
      head.appendChild(copyBtn);

      var pre = document.createElement('pre');
      pre.innerHTML = ruleHtml(b);

      wrap.appendChild(head);
      wrap.appendChild(pre);
      content.appendChild(wrap);
    });
  }

  document.getElementById('copyAll').onclick = function () {
    if (!blocksData.length) return;
    var all = blocksData.map(ruleText).join('\n\n');
    copyText(all, this);
  };

  document.getElementById('refresh').onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'refresh' } }, '*');
  };

  childrenToggle.onchange = function () {
    parent.postMessage({ pluginMessage: { type: 'options', includeChildren: childrenToggle.checked } }, '*');
  };

  onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'selection') {
      if (typeof msg.includeChildren === 'boolean') childrenToggle.checked = msg.includeChildren;
      render(msg);
    }
  };
</script>
</body>
</html>
