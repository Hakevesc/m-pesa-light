  Button variants available:
  - btn-primary (primary red button with icon support)
  - btn-secondary (light gray ghost button)
  
  CSS in styles/component-button.css
  
  Usage:
  <button class="btn-primary" onclick="handler()">
    <i data-lucide="icon-name"></i>
    Label Text
  </button>
  
  <button class="btn-secondary" onclick="handler()">
    Label Text
  </button>
-->

<button class="btn-primary" onclick="">

</button>

<!-- Secondary Button Example -->
<button class="btn-secondary" onclick="">

</button>
