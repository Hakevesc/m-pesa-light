<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfer to Bank - Confirm & PIN</title>
<style>
    @import url("styles/component-keypad.css");
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --Primary-Dark: #C41520;
    --Primary-Darker: #A41016;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Surface-Container: #FCFCFC;
    --Gray-0: #FFF;
    --On-Primary: #FFF1F2;
    --Border: #E8E8EC;
    --Background: #F5F5F5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 360px;
    height: 780px;
    background: var(--Background);
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .app-content {
    height: 100%;
    overflow-y: auto;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  /* Status Bar (like Lehulum Home) */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 14px 24px 8px;
    background: var(--Background);
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  /* Header Navigation (like Manage Statement) */
  .header-nav {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 12px;
    background: var(--Background);
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(0,0,0,0.05); }
  .back-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--On-Surface);
    stroke-width: 1.8px;
  }

  .header-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.3px;
    flex: 1;
    text-align: center;
  }

  /* Main Content */
  .main-content {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
    width: 100%;
    gap: 20px;
  }

  /* ===== RECEIVER CONFIRMATION CARD ===== */
  .receiver-card {
    background: #FFF;
    border-radius: 16px;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
  }

  .receiver-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #E8E8EC;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'Switzer', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--On-Surface);
  }

  .receiver-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .receiver-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .receiver-amount {
    color: var(--Primary);
    font-family: 'Switzer', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }

  .receiver-account {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 12px;
    font-weight: 400;
  }

  .receiver-bank-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    overflow: hidden;
    background: #F5F5F5;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .receiver-bank-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
  }

  /* ===== PIN SECTION ===== */
  .pin-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .pin-label {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-align: center;
  }

  /* PIN Boxes - Same as Create PIN */
  .pin-container {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .pin-box {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #FFF;
    border: 2px solid #ECECEC;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  }

  .pin-box.filled { background: #FFF; border-color: transparent; }
  .pin-box.filled .dot {
    width: 16px; height: 16px; border-radius: 50%; background: var(--On-Surface);
  }
  .pin-box.active { border-color: var(--Primary); background: #FFF5F5; }
  .pin-box.active .dot { display: none; }
  .pin-box.active::after {
    content: ''; width: 2px; height: 24px; background: var(--Primary);
    animation: cursor-blink 1s step-end infinite;
  }

  @keyframes cursor-blink {
    from, to { background-color: transparent }
    50% { background-color: var(--Primary) }
  }

  .pin-box.error { border-color: var(--Primary); background: #FFF5F5; animation: shake 0.4s ease-in-out; }
  .pin-box.error .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--Primary); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Hidden Input */
  .pin-input { position: absolute; opacity: 0; pointer-events: none; }

  /* ===== KEYPAD (matching Create PIN page) ===== */
  

  

  

  
  
  

  
  

  
  
  
  

  
  
  

  /* ===== TRANSFER BUTTON ===== */
  .transfer-btn {
    height: 52px;
    border-radius: 14px;
    border: none;
    background: #E0E0E0;
    color: var(--On-Surface-Low);
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: not-allowed;
    transition: all 0.2s;
  }

  .transfer-btn.active {
    background: var(--Primary);
    color: #FFF;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(254, 53, 61, 0.25);
  }

  .transfer-btn.active:hover {
    background: #E5303A;
    box-shadow: 0 6px 20px rgba(254, 53, 61, 0.35);
    transform: translateY(-1px);
  }

  .transfer-btn.active:active { transform: scale(0.98) translateY(0); }

  /* ===== SUCCESS OVERLAY ===== */
  .success-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .success-overlay.show { display: flex; }

  .success-modal {
    width: 280px;
    background: #FFF;
    border-radius: 20px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .success-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--On-Primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .success-icon svg { width: 36px; height: 36px; stroke: var(--Primary); stroke-width: 2.5px; }

  .success-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .success-subtitle {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .success-done-btn {
    width: 100%;
    height: 44px;
    border-radius: 12px;
    background: var(--Primary);
    color: #FFF;
    border: none;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .success-done-btn:hover { background: #E5303A; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <!-- Status Bar (like Lehulum Home) -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#1C1C21"/><path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#1C1C21"/><path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#1C1C21"/></svg>
        <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="4" height="12" rx="1" fill="#1C1C21"/><rect x="8" y="4" width="4" height="14" rx="1" fill="#1C1C21"/><rect x="14" y="2" width="4" height="16" rx="1" fill="#1C1C21"/><rect x="20" y="0" width="4" height="18" rx="1" fill="#1C1C21" opacity="0.3"/></svg>
        <svg viewBox="0 0 28 14" fill="none"><rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/><rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/><rect x="24" y="4" width="2" height="6" rx="1" fill="#1C1C21"/></svg>
      </div>
    </div>

    <!-- Header Navigation (like Manage Statement) -->
    <div class="header-nav">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span class="header-title">Transfer to Bank</span>
      <div style="width: 36px;"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Receiver Confirmation Card (larger padding, larger font) -->
      <div class="receiver-card">
        <div class="receiver-avatar">KB</div>
        <div class="receiver-info">
          <span class="receiver-name">Kidist Birhanu</span>
          <span class="receiver-amount">-950.00 ETB</span>
          <span class="receiver-account">Awash Bank • ****56436</span>
        </div>
        <div class="receiver-bank-icon">
          <img src="assets/banks logo/awass-bank.png" alt="Awash Bank" onerror="this.style.display='none'">
        </div>
      </div>

      <!-- PIN Section -->
      <div class="pin-section">
        <span class="pin-label">Enter Your M-PESA PIN</span>

        <div class="pin-container" id="pinContainer">
          <div class="pin-box" data-index="0"><div class="dot"></div></div>
          <div class="pin-box" data-index="1"><div class="dot"></div></div>
          <div class="pin-box" data-index="2"><div class="dot"></div></div>
          <div class="pin-box" data-index="3"><div class="dot"></div></div>
        </div>

        <input type="password" class="pin-input" id="pinInput" maxlength="4" inputmode="numeric">
      </div>

      <!-- Keypad -->
      <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key empty"></button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key delete" onclick="pressBackspace()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </button>
      </div>

      <!-- Transfer Button -->
      <button class="transfer-btn" id="transferBtn" onclick="confirmTransfer()" disabled>Transfer</button>

    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-modal">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h3 class="success-title">Transfer Successful!</h3>
        <p class="success-subtitle">-950.00 ETB sent to Kidist Birhanu</p>
        <button class="success-done-btn" onclick="closeSuccess()">Done</button>
      </div>
    </div>

  </div>
</div>

<script>
  let pin = '';
  const pinInput = document.getElementById('pinInput');
  const pinBoxes = document.querySelectorAll('.pin-box');
  const transferBtn = document.getElementById('transferBtn');

  function updatePinDisplay() {
    pinBoxes.forEach((box, index) => {
      box.classList.remove('filled', 'active', 'error');
      if (index < pin.length) { box.classList.add('filled'); }
      else if (index === pin.length) { box.classList.add('active'); }
    });
    if (pin.length === 4) {
      transferBtn.classList.add('active');
      transferBtn.disabled = false;
    } else {
      transferBtn.classList.remove('active');
      transferBtn.disabled = true;
    }
  }

  function pressKey(value) {
    if (pin.length < 4) { pin += value; pinInput.value = pin; updatePinDisplay(); }
  }

  function pressBackspace() {
    pin = pin.slice(0, -1); pinInput.value = pin; updatePinDisplay();
  }

  function confirmTransfer() {
    if (pin.length === 4) { document.getElementById('successOverlay').classList.add('show'); }
  }

  function closeSuccess() {
    window.location.href = 'Transaction Confirmation.html';
  }

  function goBack() { console.log('Navigate back'); }

  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') { pressKey(e.key); }
    else if (e.key === 'Backspace') { pressBackspace(); }
    else if (e.key === 'Enter' && pin.length === 4) { confirmTransfer(); }
  });

  document.querySelector('.keypad').addEventListener('click', function() { pinInput.focus(); });
  updatePinDisplay();
</script>


<!-- Export to Figma button (shared exporter) -->
<script src="figma-export.js"></script>
</body>
</html>
