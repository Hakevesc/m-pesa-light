<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to M-PESA Lehulum</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --On-Surface: #1C1C21;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Switzer', 'Inter', sans-serif;
    background: transparent;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
  }

  .phone-frame {
    width: 360px; height: 780px;
    border-radius: 30px; overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  /* Full-cover background image */
  .bg-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    z-index: 0;
  }

  /* Gradient overlays */
  .overlay-top {
    position: absolute; top: 0; left: 0; right: 0; height: 160px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
    z-index: 1;
  }
  .overlay-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 65%;
    background: linear-gradient(to top,
      rgba(0,0,0,0.92) 0%,
      rgba(0,0,0,0.72) 40%,
      rgba(0,0,0,0.20) 75%,
      transparent 100%);
    z-index: 1;
  }

  /* Screen layout over the image */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    z-index: 2;
  }

  /* Status bar */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px 8px;
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: #FFF; font-family: 'Switzer', sans-serif; }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  /* M-PESA logo */
  .logo-wrap {
    display: flex; justify-content: center; padding: 32px 20px 0;
  }
  .logo-wrap img { height: 36px; width: auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }

  /* Spacer pushes content to bottom */
  .spacer { flex: 1; }

  /* Bottom content */
  .bottom-content {
    padding: 0 24px 36px;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }

  .welcome-text { text-align: center; margin-bottom: 24px; }
  .welcome-text h1 {
    color: #FFF; font-family: 'Switzer', sans-serif;
    font-size: 28px; font-weight: 700; line-height: 1.25;
    margin-bottom: 10px; letter-spacing: 0.2px;
  }
  .welcome-text p {
    color: rgba(255,255,255,0.85); font-family: 'Switzer', sans-serif;
    font-size: 15px; font-weight: 300; line-height: 1.5;
  }

  /* Pagination dots */
  .pagination {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 28px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.40); transition: all 0.3s ease;
  }
  .dot.active {
    background: #FFF; width: 24px; border-radius: 4px;
  }

  /* Buttons — exact component-button.css styles */
  .buttons { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .btn {
    width: 100%; height: 48px; border-radius: 12px;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--Primary); color: #FFF1F2;
    box-shadow: 0 4px 16px rgba(254,53,61,0.25);
  }
  .btn-primary:hover { background: #E5303A; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(254,53,61,0.35); }
  .btn-primary:active { transform: scale(0.98) translateY(0); }

  .btn-secondary {
    background: #FFF; color: var(--On-Surface);
  }
  .btn-secondary:hover { background: #F5F5F5; transform: translateY(-1px); }
  .btn-secondary:active { background: #ECECEC; transform: scale(0.98); }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- Full-cover background photo -->
  <img class="bg-image" src="assets/first-visit-1.jpg" alt="">

  <!-- Gradient overlays -->
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>

  <!-- Screen content -->
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z" fill="#FFF"/>
          <path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#FFF"/>
          <path d="M9 17l2 2c1.1-1.1 2.9-1.1 4 0l2-2c-2.21-2.21-5.79-2.21-8 0z" fill="#FFF"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="4" height="12" rx="1" fill="#FFF"/>
          <rect x="8" y="4" width="4" height="14" rx="1" fill="#FFF"/>
          <rect x="14" y="2" width="4" height="16" rx="1" fill="#FFF"/>
          <rect x="20" y="0" width="4" height="18" rx="1" fill="#FFF" opacity="0.4"/>
        </svg>
        <svg viewBox="0 0 28 14" fill="none">
          <rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#FFF" stroke-width="1.5"/>
          <rect x="2" y="3" width="16" height="8" rx="1" fill="#FFF"/>
          <rect x="24" y="4" width="2" height="6" rx="1" fill="#FFF"/>
        </svg>
      </div>
    </div>

    <!-- M-PESA Logo -->
    <div class="logo-wrap">
      <img src="assets/m-pesa-white-logo.svg" alt="M-PESA">
    </div>

    <div class="spacer"></div>

    <!-- Welcome text + dots + buttons -->
    <div class="bottom-content">

      <div class="welcome-text">
        <h1>Welcome to<br>M-PESA Lehulum</h1>
        <p>Your all-in-one mobile money app,<br>made just for you.</p>
      </div>

      <div class="pagination">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="buttons">
        <a href="first-visit-2.html" class="btn btn-primary">Get Started</a>
        <a href="M-PESA No. Login.html" class="btn btn-secondary">Sign In</a>
      </div>

    </div>
  </div>

</div>

<script src="figma-export.js"></script>
</body>
</html>
