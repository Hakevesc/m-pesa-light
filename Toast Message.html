<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toast Notifications</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --On-Surface:     #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Success:        #1FC83B;
    --Success-Light:  #E8F9EC;
    --Danger:         #FE353D;
    --Danger-Light:   #FFF1F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px 20px;
  }

  /* ═══════════════════════════
     Toast
  ═══════════════════════════ */
  .toast {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.10);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 300px;
    animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .toast:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0, 0, 0, 0.14);
  }

  .toast:active { transform: scale(0.97); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0)    scale(1);    }
  }

  /* Variants */
  .toast.success { background: var(--Success-Light); }
  .toast.error   { background: var(--Danger-Light);  }

  /* ── Icon ── */
  .toast-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .toast.success .toast-icon {
    background: transparent;
    border: 2px solid var(--Success);
  }
  .toast.error .toast-icon {
    background: transparent;
    border: 2px solid var(--Danger);
  }

  .toast-icon svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke-width: 2.5px;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .toast.success .toast-icon svg { stroke: var(--Success); }
  .toast.error   .toast-icon svg { stroke: var(--Danger);  }

  /* ── Text ── */
  .toast-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .toast-title {
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--On-Surface);
    letter-spacing: 0.15px;
    line-height: 1.3;
  }

  .toast-subtitle {
    font-family: 'Switzer', sans-serif;
    font-size: 11.5px;
    font-weight: 400;
    color: var(--On-Surface-Low);
    letter-spacing: 0.1px;
    line-height: 1.4;
  }
</style>
</head>
<body>

  <!-- Success Toast -->
  <div class="toast success">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="toast-content">
      <div class="toast-title">Added to Favorites</div>
      <div class="toast-subtitle">Mom M-PESA has been saved to favorites</div>
    </div>
  </div>

  <!-- Error Toast -->
  <div class="toast error">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9"  x2="12"    y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <div class="toast-content">
      <div class="toast-title">Removed from Favorites</div>
      <div class="toast-subtitle">Mom M-PESA has been removed</div>
    </div>
  </div>

</body>
</html>
