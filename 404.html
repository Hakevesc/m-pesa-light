<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-PESA App Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Switzer:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Switzer', sans-serif;
    background: linear-gradient(135deg, #A41016 0%, #ED1C24 100%);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 270px;
    min-width: 270px;
    background: #FFF;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    border-right: 1px solid #E8E8EC;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #E8E8EC;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .sidebar-header .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: #FE353D;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff; font-weight: 700;
  }
  .sidebar-header .title { color: #1C1C21; font-size: 15px; font-weight: 600; font-family: 'Switzer', sans-serif; }
  .sidebar-header .subtitle { color: #7C7C87; font-size: 11px; font-weight: 400; }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 20px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: #D0D0D5; border-radius: 2px; }

  /* ===== CATEGORY GROUP ===== */
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 6px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s;
    border-radius: 0;
    margin: 0;
  }
  .category-header:hover { background: #F5F5F5; }

  .category-label {
    color: #7C7C87;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Switzer', sans-serif;
  }

  .category-chevron {
    width: 16px; height: 16px;
    stroke: #7C7C87;
    stroke-width: 2;
    fill: none;
    transition: transform 0.2s;
  }
  .category-chevron.collapsed { transform: rotate(-90deg); }

  .category-items {
    overflow: hidden;
    max-height: 1000px;
    transition: max-height 0.25s ease;
  }
  .category-items.closed {
    max-height: 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    margin: 1px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
    color: #1C1C21;
    font-size: 13px;
    font-weight: 400;
    font-family: 'Switzer', sans-serif;
    text-decoration: none;
    border: none;
    background: transparent;
    width: calc(100% - 16px);
    text-align: left;
  }
  .nav-item:hover { background: #F5F5F5; color: #1C1C21; }
  .nav-item.active {
    background: #FFF1F2;
    color: #FE353D;
    font-weight: 600;
  }
  .nav-item .icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-item .icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  .nav-item .count {
    margin-left: auto;
    background: #F0F0F0;
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 10px;
    color: #7C7C87;
  }

  /* ===== MAIN ===== */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: linear-gradient(90deg, #A41016 0%, #ED1C24 100%);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }
  .main-toolbar .page-title { color: #fff; font-size: 14px; font-weight: 600; font-family: 'Switzer', sans-serif; }
  .main-toolbar .page-path { color: rgba(255,255,255,0.35); font-size: 11px; font-family: monospace; }
  .content-frame { flex: 1; overflow: hidden; }
  .content-frame iframe { width: 100%; height: 100%; border: none; background: transparent; }

  /* Mobile */
  .mobile-toggle {
    display: none; position: fixed; top: 10px; left: 10px; z-index: 1000;
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(254,53,61,0.9); border: none; cursor: pointer;
    align-items: center; justify-content: center;
  }
  .mobile-toggle svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2; }
  .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }

  /* ===== TEST FAB ON INDEX.HTML ===== */
  .test-fab-global {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 2000;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #6C5CE7;
    border: 3px solid #FFF;
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    transition: all 0.3s;
  }
  .test-fab-global:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(108, 92, 231, 0.6); }
  .test-fab-global:active { transform: scale(0.92); }

  .test-panel-overlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.35);
    display: none;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 20px;
  }
  .test-panel-overlay.open { display: flex; }

  .test-panel {
    background: #FFF; border-radius: 20px 20px 0 0;
    width: 100%; max-width: 420px; max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    animation: slideUpPanel 0.3s ease-out;
    padding: 20px 16px 30px;
  }
  @keyframes slideUpPanel {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .test-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; padding-bottom: 12px;
    border-bottom: 1px solid #F0F0F0;
  }
  .test-panel-header h3 { font-family:'Switzer',sans-serif; font-size:16px; font-weight:600; color:#1C1C21; }
  .test-panel-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: #F5F5F5; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #666;
  }
  .test-panel-close:hover { background: #EBEBEB; }

  .test-scenario {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 12px;
    cursor: pointer; transition: background 0.15s;
    margin-bottom: 2px;
  }
  .test-scenario:hover { background: #FAFAFA; }
  .test-scenario:active { background: #F0F0F0; }

  .test-scenario-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: #F0EEFF; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px;
  }
  .test-scenario-info { flex: 1; }
  .test-scenario-info .name { font-family:'Switzer',sans-serif; font-size:13px; font-weight:600; color:#1C1C21; }
  .test-scenario-info .desc { font-family:'Switzer',sans-serif; font-size:11px; color:#7C7C87; margin-top:1px; }
  .test-scenario-arrow { color:#C0C0C0; font-size:14px; flex-shrink:0; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUpModal { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -290px; top: 0; z-index: 100; transition: left 0.3s; box-shadow: 4px 0 24px rgba(0,0,0,0.3); }
    .sidebar.open { left: 0; }
    .sidebar-overlay.open { display: block; }
    .mobile-toggle { display: flex; }
    .main-toolbar { padding-left: 52px; }
  }
</style>

  const nav = document.getElementById('sidebarNav');

  let collapsedGroups = JSON.parse(localStorage.getItem('sidebarCollapsed') || '[]');

  groups.forEach(group => {
    const items = pages.filter(p => p.group === group);
    const isCollapsed = collapsedGroups.includes(group);

    // Category header
    const header = document.createElement('div');
    header.className = 'category-header';
    header.innerHTML = `
      <span class="category-label">${group}</span>
      <svg class="category-chevron ${isCollapsed ? 'collapsed' : ''}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    `;
    header.onclick = () => toggleGroup(group);

    // Items container
    const container = document.createElement('div');
    container.className = `category-items ${isCollapsed ? 'closed' : ''}`;

    items.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'nav-item';
      btn.innerHTML = `<span class="icon">${icons[p.icon] || icons.home}</span>${p.label}`;
      btn.dataset.page = p.file;
      btn.onclick = () => loadPage(btn, p.file, p.label);
      container.appendChild(btn);
    });

    nav.appendChild(header);
    nav.appendChild(container);
  });

  // Functions

  function toggleGroup(name) {
    const idx = collapsedGroups.indexOf(name);
    if (idx > -1) collapsedGroups.splice(idx, 1);
    else collapsedGroups.push(name);
    localStorage.setItem('sidebarCollapsed', JSON.stringify(collapsedGroups));

    // Update DOM
    const headers = document.querySelectorAll('.category-header');
    headers.forEach(h => {
      if (h.querySelector('.category-label').textContent === name) {
        const chevron = h.querySelector('.category-chevron');
        chevron.classList.toggle('collapsed');
        h.nextElementSibling.classList.toggle('closed');
      }
    });
  }

    document.getElementById('pageTitle').textContent = label || file;
    document.getElementById('pagePath').textContent = file;
    closeSidebar();
  }

  function toggleTestPanel() {
    const existing = document.getElementById('testPanelContainer');
    if (existing) { existing.remove(); return; }
    renderTestPanel();
  }

  function renderTestPanel() {
    const container = document.createElement('div');
    container.id = 'testPanelContainer';
    container.innerHTML = `
      <div class="test-panel-overlay open" id="testPanelOverlay" onclick="if(event.target===this)closeTestPanel()">
        <div class="test-panel">
          <div class="test-panel-header">
            <h3>🧪 Test Scenarios</h3>
            <button class="test-panel-close" onclick="closeTestPanel()">&times;</button>
          </div>
          ${testScenarios.map(s => `
            <div class="test-scenario" onclick="runTestScenario('${s.id}')">
              <div class="test-scenario-icon">${s.icon}</div>
              <div class="test-scenario-info">
                <div class="name">${s.name}</div>
                <div class="desc">${s.desc}</div>
              </div>
              <div class="test-scenario-arrow">›</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(container);
  }

  function closeTestPanel() {
    const container = document.getElementById('testPanelContainer');
    if (container) container.remove();
  }

  function runTestScenario(scenarioId) {
    closeTestPanel();
    const scenario = testScenarios.find(s => s.id === scenarioId);
    if (!scenario) return;

    // Send the popup HTML/CSS into the iframe via postMessage
    const iframe = document.getElementById('pageIframe');
    if (iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage({
        type: 'showTestPopup',
        html: scenario.html,
        css: scenario.css || ''
      }, '*');
    }

    document.getElementById('pageTitle').textContent = '🧪 ' + scenario.name;
    document.getElementById('pagePath').textContent = 'Lehulum Home.html + Popup';
  }
