<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&family=Barlow:wght@400&display=swap');
  @import url('https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700&display=swap');

  :root {
    --Primary: #FE353D;
    --Primary-Dark: #C41520;
    --Primary-Darker: #A41016;
    --On-Surface: #1C1C21;
    --On-Surface-Low: #7C7C87;
    --Surface-Container: #FCFCFC;
    --Gray-0: #FFF;
    --On-Primary: #FFF1F2;
    --Primary-Light: #FFF1F2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Switzer', sans-serif;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 360px;
    height: 780px;
    background: #F5F5F5;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .app-content {
    height: 100%;
    overflow-y: auto;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .app-content::-webkit-scrollbar { width: 0; }

  /* Status Bar */
  .status-bar {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 14px 24px 8px;
    background: #F5F5F5;
  }
  .status-bar .time { font-size: 14px; font-weight: 600; color: var(--On-Surface); }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { width: 18px; height: 18px; }

  /* Header Navigation */
  .header-nav {
    position: relative;
    z-index: 5;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px 8px;
    background: #F5F5F5;
  }

  .back-btn {
    position: absolute;
    left: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }

  .back-btn:hover {
    background: rgba(0,0,0,0.05);
    transform: scale(1.05);
  }

  .back-btn svg {
    width: 24px;
    height: 24px;
    stroke: var(--On-Surface);
    stroke-width: 1.5px;
  }

  .header-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* Main Content */
  .main-content {
    padding: 0 16px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
    width: 100%;
  }

  /* Profile Section */
  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0 20px;
  }

  .avatar-wrapper {
    position: relative;
    width: 110px;
    height: 110px;
    margin-bottom: 16px;
  }

  .profile-avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid var(--Primary);
    overflow: hidden;
    background: #FFF;
    box-shadow: 0 4px 16px rgba(254, 53, 61, 0.15);
  }

  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .camera-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--Primary);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2.5px solid #F5F5F5;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(254, 53, 61, 0.3);
  }

  .camera-badge:hover {
    background: #E5303A;
    transform: scale(1.08);
  }

  .camera-badge i {
    width: 14px !important;
    height: 14px !important;
    color: #FFF;
    stroke-width: 2px;
  }

  .profile-name {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
    text-align: center;
  }

  .profile-phone {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  /* Account Tier Card */
  .tier-card {
    width: 100%;
    border-radius: 16px;
    background: linear-gradient(135deg, #C41520 0%, #FE353D 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(254, 53, 61, 0.25);
  }

  .tier-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .tier-info .tier-label {
    color: rgba(255, 255, 255, 0.85);
    font-family: 'Switzer', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .tier-info .tier-value {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #FFF;
    font-family: 'Switzer', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .tier-info .tier-value i {
    width: 20px !important;
    height: 20px !important;
    color: #FFF;
    stroke-width: 2px;
  }

  .upgrade-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    background: #FFF;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .upgrade-btn:hover {
    background: #F5F5F5;
    transform: scale(1.03);
  }

  .upgrade-btn span {
    color: var(--Primary);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .upgrade-btn i {
    width: 14px !important;
    height: 14px !important;
    color: var(--Primary);
    stroke-width: 2px;
  }

  /* Detail Card */
  .detail-card {
    width: 100%;
    background: #FFF;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
  }

  .detail-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    gap: 12px;
  }

  .detail-item + .detail-item {
    border-top: 1px solid #F0F0F0;
  }

  .detail-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .detail-content .detail-label {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .detail-content .detail-value {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.2px;
    word-break: break-word;
  }

  .detail-action {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 10px;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .detail-action:hover {
    background: #F5F5F5;
  }

  .detail-action i {
    width: 18px !important;
    height: 18px !important;
    color: var(--Primary);
    stroke-width: 2px;
  }

  .detail-action.locked i {
    color: #D0D0D0;
  }

  /* ===== Edit Popup Styles ===== */
  .edit-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease-out;
    padding: 20px;
  }

  .edit-overlay.hidden {
    display: none;
  }

  .edit-modal {
    width: 100%;
    max-width: 330px;
    background: #FFF;
    border-radius: 24px;
    padding: 28px 24px 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideUp 0.25s ease-out;
  }

  .edit-modal .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .edit-modal .modal-header .modal-title {
    color: var(--On-Surface);
    font-family: 'Switzer', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .edit-modal .close-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #F5F5F5;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .edit-modal .close-btn:hover {
    background: #EBEBEB;
  }

  .edit-modal .close-btn svg {
    width: 18px;
    height: 18px;
    stroke: var(--On-Surface-Low);
    stroke-width: 2px;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .edit-modal .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .edit-modal .form-group label {
    color: var(--On-Surface-Low);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .edit-modal .form-group input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #E8E8E8;
    border-radius: 12px;
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--On-Surface);
    outline: none;
    transition: border-color 0.2s;
    background: #FAFAFA;
  }

  .edit-modal .form-group input:focus {
    border-color: var(--Primary);
    background: #FFF;
  }

  .edit-modal .form-group input::placeholder {
    color: #B0B0B0;
    font-weight: 400;
  }

  .edit-modal .form-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .edit-modal .btn-save {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    background: var(--Primary);
    border: none;
    cursor: pointer;
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #FFF;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .edit-modal .btn-save:hover {
    background: var(--Primary-Dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(254, 53, 61, 0.3);
  }

  .edit-modal .btn-save:active {
    transform: scale(0.98);
  }

  .edit-modal .btn-cancel {
    width: 100%;
    height: 48px;
    border-radius: 14px;
    background: transparent;
    border: 1.5px solid #E8E8E8;
    cursor: pointer;
    font-family: 'Switzer', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--On-Surface-Low);
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .edit-modal .btn-cancel:hover {
    background: #F5F5F5;
  }

  .edit-modal .btn-cancel:active {
    transform: scale(0.98);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="app-content">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">10:00</span>
      <div class="status-icons">

        <svg viewBox="0 0 24 24" fill="none">

          <path d="M1.42 9a16 16 0 0 1 21.16 0" stroke="#1C1C21" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" stroke="#1C1C21" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="20" x2="12.01" y2="20" stroke="#1C1C21" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg viewBox="0 0 28 14" fill="none">
          <rect x="0" y="1" width="22" height="12" rx="2.5" stroke="#1C1C21" stroke-width="1.5"/>
          <rect x="2" y="3" width="16" height="8" rx="1" fill="#1C1C21"/>

      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

        </svg>
      </button>

    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Profile Section -->
      <div class="profile-section">

        <!-- Email -->

        <!-- Fayda Registered Mobile Number -->
        <div class="detail-item">
          <div class="detail-content">

        <div class="detail-item">

        <!-- Date of Birth -->
        <div class="detail-item">

</div>

<!-- ===== Edit Profile Popup ===== -->
<div class="edit-overlay hidden" id="editOverlay">
  <div class="edit-modal">
    <div class="modal-header">
      <span class="modal-title" id="editModalTitle">Edit Email</span>
      <button class="close-btn" onclick="closeEditPopup()" title="Close">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="form-group">
      <label for="editFieldInput">Current value: <span id="editCurrentValue" style="font-weight:600;color:var(--On-Surface);"></span></label>
      <input type="text" id="editFieldInput" placeholder="Enter your email">
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
      <button class="btn-cancel" onclick="closeEditPopup()">Cancel</button>
    </div>
  </div>
</div>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  // Initialize Lucide icons
  lucide.createIcons();

  // Go back
  function goBack() {
    window.location.href = 'Account.html';
  }

  // Change photo
  function changePhoto() {
    console.log('Opening photo picker...');
    // In real app, trigger file input or camera
  }

  // Upgrade tier
  function upgradeTier() {
    console.log('Navigating to tier upgrade...');
  }

  // ===== Edit Popup Logic =====
  let currentEditField = '';

  function editField(fieldName) {
    currentEditField = fieldName;
    const overlay = document.getElementById('editOverlay');
    const title = document.getElementById('editModalTitle');
    const input = document.getElementById('editFieldInput');
    const currentValue = document.getElementById('editCurrentValue');

    title.textContent = 'Edit ' + fieldName;
    input.placeholder = 'Enter your ' + fieldName.toLowerCase();

    // Get the current value from the detail card
    const items = document.querySelectorAll('.detail-item');
    let currentText = '';
    items.forEach(item => {
      const label = item.querySelector('.detail-label');
      if (label && label.textContent === fieldName) {
        currentText = item.querySelector('.detail-value').textContent;
      }
    });
    currentValue.textContent = currentText;
    input.value = currentText;

    overlay.classList.remove('hidden');
    setTimeout(() => input.focus(), 100);
  }

  function closeEditPopup() {
    document.getElementById('editOverlay').classList.add('hidden');
  }

  function saveEdit() {
    const input = document.getElementById('editFieldInput');
    const newValue = input.value.trim();

    if (!newValue) {
      input.style.borderColor = 'var(--Primary)';
      input.focus();
      return;
    }

    input.style.borderColor = '#E8E8E8';

    // Update the value in the detail card
    const items = document.querySelectorAll('.detail-item');
    items.forEach(item => {
      const label = item.querySelector('.detail-label');
      if (label && label.textContent === currentEditField) {
        item.querySelector('.detail-value').textContent = newValue;
      }
    });

    // If editing nickname, also update the profile name at the top
    if (currentEditField === 'Nickname') {
      document.querySelector('.profile-name').textContent = newValue;
    }

    console.log('Saved', currentEditField + ':', newValue);
    closeEditPopup();
  }

  // Close popup on overlay click
  document.addEventListener('DOMContentLoaded', function() {
    const overlay = document.getElementById('editOverlay');
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) {
        closeEditPopup();
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !overlay.classList.contains('hidden')) {
        closeEditPopup();
      }
    });

    // Save on Enter key
    document.getElementById('editFieldInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        saveEdit();
      }
    });
  });
</script>
