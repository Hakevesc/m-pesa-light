<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: var(--figma-color-text, #1c1c21);
    background: var(--figma-color-bg, #fff);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header { padding: 12px 14px 8px; flex-shrink: 0; }
  h1 { font-size: 13px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 7px; }
  h1 .dot { width: 14px; height: 14px; border-radius: 4px; background: linear-gradient(135deg, #a259ff, #FE353D); }
  .sub { color: var(--figma-color-text-secondary, #7c7c87); margin: 3px 0 0 21px; font-size: 11px; }

  .panel { padding: 4px 14px; }
  .group-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px;
    color: var(--figma-color-text-secondary, #7c7c87); margin: 10px 0 5px;
  }
  .opt { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; cursor: pointer; }
  .opt input { margin: 1px 0 0; cursor: pointer; flex-shrink: 0; }
  .opt .t { font-weight: 500; }
  .opt .d { color: var(--figma-color-text-secondary, #7c7c87); font-size: 11px; line-height: 1.35; margin-top: 1px; }

  .seg { display: flex; gap: 4px; margin-top: 4px; }
  .seg button {
    flex: 1; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 500;
    border: 1px solid var(--figma-color-border, #e0e0e3);
    background: var(--figma-color-bg, #fff); color: var(--figma-color-text, #1c1c21);
  }
  .seg button.active { background: var(--figma-color-bg-brand, #0d99ff); color: #fff; border-color: transparent; }

  .actions { display: flex; gap: 8px; padding: 10px 14px; flex-shrink: 0; }
  .actions button {
    flex: 1; padding: 9px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 600;
  }
  .primary { background: var(--figma-color-bg-brand, #0d99ff); color: #fff; }
  .primary:disabled { opacity: .55; cursor: default; }
  .ghost { background: var(--figma-color-bg-secondary, #f0f0f3); color: var(--figma-color-text, #1c1c21); }

  .stats {
    margin: 0 14px; padding: 7px 10px; border-radius: 6px; font-size: 11px;
    background: var(--figma-color-bg-secondary, #f4f6f5); color: var(--figma-color-text-secondary, #555);
    display: none;
  }
  .stats b { color: var(--figma-color-text, #1c1c21); }
  .stats.err { background: #ffe8e8; color: #b00020; display: block; }

  .out { flex: 1; display: none; flex-direction: column; min-height: 0; padding: 8px 14px 0; }
  .tabs { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
  .tabs button {
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--figma-color-border, #e0e0e3); background: transparent; color: inherit;
  }
  .tabs button.active { background: var(--figma-color-bg-secondary, #ececef); }
  .tabs .spacer { flex: 1; }
  .tabs .mini { border: none; background: transparent; color: var(--figma-color-bg-brand, #0d99ff); font-weight: 600; }
  textarea {
    flex: 1; width: 100%; resize: none; font-family: 'SF Mono', Menlo, Consolas, monospace;
    font-size: 11px; line-height: 1.5; padding: 9px; border-radius: 7px;
    border: 1px solid var(--figma-color-border, #e0e0e3);
    background: var(--figma-color-bg-secondary, #fafafa); color: var(--figma-color-text, #1c1c21);
    white-space: pre; overflow: auto; margin-bottom: 12px;
  }
  .scroll { overflow-y: auto; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span> Figma → HTML Exporter</h1>
  <div class="sub">Clean, optimised HTML/CSS from your selection.</div>
</header>

<div class="scroll" id="config">
  <div class="panel">
    <div class="group-label">Source</div>
    <div class="seg" id="scopeSeg">
      <button data-scope="selection" class="active">Selection</button>
      <button data-scope="page">Whole page</button>
    </div>

    <div class="group-label">Clean-up</div>
    <label class="opt">
      <input type="checkbox" id="simplifyFrames" checked>
      <span><span class="t">Simplify junky frames</span><div class="d">Unwrap wrapper frames &amp; groups that add no styling — flattens needless nesting.</div></span>
    </label>
    <label class="opt">
      <input type="checkbox" id="stripLayout" checked>
      <span><span class="t">Strip purposeless auto-layout</span><div class="d">Demote auto-layouts that wrap 0–1 children to plain blocks.</div></span>
    </label>
    <label class="opt">
      <input type="checkbox" id="dedupe" checked>
      <span><span class="t">De-duplicate styles into classes</span><div class="d">Identical styles collapse to one reusable CSS class.</div></span>
    </label>
    <label class="opt">
      <input type="checkbox" id="useTokens" checked>
      <span><span class="t">Snap colours to design tokens</span><div class="d">Matching colours become <code>var(--Primary)</code> etc.</div></span>
    </label>

    <div class="group-label">Output</div>
    <label class="opt">
      <input type="checkbox" id="inlineStyles">
      <span><span class="t">Inline styles instead of classes</span><div class="d">Use <code>style="…"</code> on each element (overrides de-dup).</div></span>
    </label>
    <label class="opt">
      <input type="checkbox" id="separate">
      <span><span class="t">Separate HTML + CSS files</span><div class="d">Link an external <code>style.css</code> instead of an inline <code>&lt;style&gt;</code>.</div></span>
    </label>
  </div>
</div>

<div class="actions">
  <button class="primary" id="exportBtn">Export to HTML</button>
  <button class="ghost" id="closeBtn">Close</button>
</div>

<div class="stats" id="stats"></div>

<div class="out" id="out">
  <div class="tabs">
    <button data-tab="html" class="active">HTML</button>
    <button data-tab="css" id="cssTab">CSS</button>
    <span class="spacer"></span>
    <button class="mini" id="copyBtn">Copy</button>
    <button class="mini" id="downloadBtn">Download</button>
  </div>
  <textarea id="code" readonly spellcheck="false"></textarea>
</div>

<script>
  var state = { scope: 'selection', tab: 'html', html: '', htmlLinked: '', css: '', separate: false };

  function opts() {
    return {
      scope: state.scope,
      simplifyFrames: document.getElementById('simplifyFrames').checked,
      stripLayout: document.getElementById('stripLayout').checked,
      dedupe: document.getElementById('dedupe').checked,
      useTokens: document.getElementById('useTokens').checked,
      inlineStyles: document.getElementById('inlineStyles').checked
    };
  }

  document.getElementById('scopeSeg').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    state.scope = b.dataset.scope;
    [].forEach.call(this.children, function (c) { c.classList.toggle('active', c === b); });
  });

  document.querySelector('.tabs').addEventListener('click', function (e) {
    var b = e.target.closest('button[data-tab]'); if (!b) return;
    state.tab = b.dataset.tab;
    document.querySelectorAll('.tabs button[data-tab]').forEach(function (x) { x.classList.toggle('active', x === b); });
    paint();
  });

  function currentHtml() { return state.separate ? state.htmlLinked : state.html; }
  function paint() {
    document.getElementById('code').value = state.tab === 'css' ? state.css : currentHtml();
  }

  document.getElementById('exportBtn').addEventListener('click', function () {
    state.separate = document.getElementById('separate').checked;
    document.getElementById('cssTab').style.display = (state.separate || !opts().inlineStyles) ? '' : 'none';
    this.disabled = true; this.textContent = 'Exporting…';
    parent.postMessage({ pluginMessage: { type: 'export', options: opts() } }, '*');
  });
  document.getElementById('closeBtn').addEventListener('click', function () {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  document.getElementById('copyBtn').addEventListener('click', function () {
    var ta = document.getElementById('code');
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) { navigator.clipboard.writeText(ta.value).catch(function () {}); }
    this.textContent = 'Copied!';
    var self = this; setTimeout(function () { self.textContent = 'Copy'; }, 1200);
  });

  document.getElementById('downloadBtn').addEventListener('click', function () {
    var isCss = state.tab === 'css';
    var content = isCss ? state.css : currentHtml();
    var name = isCss ? 'style.css' : 'index.html';
    var blob = new Blob([content], { type: isCss ? 'text/css' : 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  });

  onmessage = function (e) {
    var msg = e.data.pluginMessage; if (!msg) return;
    var btn = document.getElementById('exportBtn');
    btn.disabled = false; btn.textContent = 'Export to HTML';
    var stats = document.getElementById('stats');

    if (msg.type === 'error') {
      stats.className = 'stats err';
      stats.textContent = '⚠ ' + msg.message;
      document.getElementById('out').style.display = 'none';
      return;
    }
    if (msg.type === 'result') {
      state.html = msg.html; state.htmlLinked = msg.htmlLinked; state.css = msg.css;
      var s = msg.stats;
      var saved = s.before > 0 ? Math.round((1 - s.after / s.before) * 100) : 0;
      stats.className = 'stats';
      stats.style.display = 'block';
      stats.innerHTML = '<b>' + s.before + '</b> nodes → <b>' + s.after + '</b> elements (' +
        saved + '% leaner) · <b>' + s.classes + '</b> CSS classes';
      document.getElementById('out').style.display = 'flex';
      paint();
    }
  };
</script>
</body>
</html>
